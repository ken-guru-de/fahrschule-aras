<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<style>
:root {
  --bg:#ffffff;--bg2:#f5f5f5;--bg3:#efefef;
  --tx:#111111;--tx2:#666666;--tx3:#999999;
  --br:rgba(0,0,0,0.12);--br2:rgba(0,0,0,0.22);
  --r-md:8px;--r-lg:12px;
  --accent:#FF6B2B;--accent2:#ff8c55;--accent-dark:#1a2744;--accent-tx:#ffffff;
  --safe-top:env(safe-area-inset-top,59px);--safe-bot:env(safe-area-inset-bottom,34px);
}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;--tx:#f2f2f7;--tx2:#aeaeb2;--tx3:#636366;--br:rgba(255,255,255,0.1);--br2:rgba(255,255,255,0.2);}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;overflow:hidden;}
.app{display:flex;flex-direction:column;height:100%;}
.screen{display:none;flex-direction:column;height:100%;}
.screen.active{display:flex;}
.topbar{display:flex;align-items:center;gap:8px;padding:calc(var(--safe-top) + 10px) 20px 12px;border-bottom:none;background:var(--accent-dark);flex-shrink:0;min-height:52px;}
.topbar-title{font-size:18px;font-weight:600;flex:1;color:white;}
.btn-icon{background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.85);font-size:22px;display:flex;align-items:center;padding:8px;border-radius:10px;min-width:44px;min-height:44px;justify-content:center;}
.btn-icon:active{background:rgba(255,255,255,0.15);}
.btn-icon.dark{color:var(--tx2);}
.btn-icon.dark:active{background:var(--bg2);}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 20px calc(var(--safe-bot) + 24px);display:flex;flex-direction:column;gap:14px;overscroll-behavior:contain;}
.sec-label{font-size:12px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
.sec-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.card{background:var(--bg);border:.5px solid var(--br);border-radius:var(--r-lg);overflow:hidden;}
.card-row{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:.5px solid var(--br);min-height:52px;}
.card-row:last-child{border-bottom:none;}
.card-label{font-size:15px;color:var(--tx2);display:flex;align-items:center;gap:6px;min-width:130px;flex-shrink:0;}
.card-label i{font-size:15px;}
.card-row input,.card-row select,.card-row textarea{flex:1;border:none;background:transparent;font-size:15px;color:var(--tx);font-family:inherit;outline:none;text-align:right;}
.card-row input[type=text],.card-row input[type=tel],.card-row input[type=search],.card-row textarea{text-align:left;}
.card-row textarea{text-align:left;resize:none;}
.card-row select option{background:var(--bg);}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.stat-box{background:var(--bg2);border-radius:var(--r-md);padding:10px 12px;}
.stat-box.accent{background:var(--accent-dark);}
.stat-box.accent .stat-lbl{color:rgba(255,255,255,0.7);}
.stat-box.accent .stat-num{color:white;}
.stat-box.accent .stat-unit{color:rgba(255,255,255,0.6);}
.stat-lbl{font-size:11px;color:var(--tx2);margin-bottom:3px;}
.stat-num{font-size:24px;font-weight:600;color:var(--tx);line-height:1.1;}
.stat-unit{font-size:12px;color:var(--tx2);font-weight:400;margin-left:2px;}
.list-item{background:var(--bg);border:.5px solid var(--br);border-radius:var(--r-lg);padding:14px 16px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;}
.list-item:active{background:var(--bg2);}
.avatar{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;flex-shrink:0;}
.av-blue{background:#B5D4F4;color:#0C447C;}
.av-teal{background:#9FE1CB;color:#085041;}
.av-purple{background:#CECBF6;color:#3C3489;}
.av-coral{background:#F5C4B3;color:#712B13;}
.av-green{background:#C0DD97;color:#27500A;}
.av-amber{background:#FAC775;color:#633806;}
.item-name{font-size:16px;font-weight:500;}
.item-sub{font-size:13px;color:var(--tx2);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-info{flex:1;min-width:0;}
.badge{font-size:12px;font-weight:500;padding:4px 10px;border-radius:20px;flex-shrink:0;}
.badge-B{background:var(--accent-dark);color:white;}
.badge-BA{background:var(--accent);color:white;}
.badge-B197{background:#3C3489;color:white;}
.badge-B17{background:#27500A;color:white;}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot-blue{background:#378ADD;}
.search-wrap{position:relative;}
.search-wrap input{width:100%;height:44px;padding:0 12px 0 38px;border:.5px solid var(--br2);border-radius:var(--r-lg);background:var(--bg2);color:var(--tx);font-size:16px;font-family:inherit;outline:none;}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--tx3);font-size:18px;pointer-events:none;}
.btn-full{width:100%;padding:15px;background:var(--bg);border:.5px solid var(--br2);border-radius:var(--r-lg);font-size:17px;font-weight:500;color:var(--tx);cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;min-height:54px;}
.btn-full:active{transform:scale(.98);background:var(--bg2);}
.btn-full.gruen{background:#EAF3DE;border-color:#97C459;color:#27500A;}
.btn-full.rot{background:#FCEBEB;border-color:#F09595;color:#A32D2D;}
.btn-full.danger{color:#E24B4A;border-color:#E24B4A;}
.fab-btn{background:none;border:none;cursor:pointer;color:var(--tx2);font-size:22px;display:flex;align-items:center;padding:4px;}
.toast{display:none;background:var(--accent-dark);color:white;border:none;border-radius:var(--r-md);padding:10px 14px;font-size:13px;align-items:center;gap:8px;flex-shrink:0;}
.toast.show{display:flex;}
.pill{padding:8px 16px;border-radius:20px;border:.5px solid var(--br2);background:var(--bg2);font-size:15px;color:var(--tx2);cursor:pointer;font-family:inherit;min-height:44px;display:flex;align-items:center;}
.pill.active{background:var(--accent);color:white;border-color:var(--accent);}
.farb-row{display:flex;gap:8px;justify-content:flex-end;flex:1;}
.farb-dot{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
.farb-dot.sel{border-color:var(--tx);}
.toggle-wrap{position:relative;width:51px;height:31px;flex-shrink:0;}
.toggle-wrap input{opacity:0;width:0;height:0;position:absolute;}
.toggle-track{position:absolute;inset:0;border-radius:16px;background:var(--bg3);border:.5px solid var(--br2);cursor:pointer;transition:background .15s;}
.toggle-track.locked{cursor:not-allowed;opacity:.4;}
.toggle-thumb{position:absolute;top:3px;left:3px;width:25px;height:25px;border-radius:50%;background:white;box-shadow:0 1px 3px rgba(0,0,0,.3);transition:transform .15s;pointer-events:none;}
.toggle-wrap input:checked+.toggle-track{background:var(--accent);border-color:var(--accent);}
.toggle-wrap input:checked+.toggle-track+.toggle-thumb{transform:translateX(20px);}
.sonder-btn-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:.5px solid var(--br);}
.sonder-btn-row:last-child{border-bottom:none;}
.sonder-btn-row.done{background:rgba(255,107,43,.1);}
.sonder-btn-row.done .sonder-btn-label{color:var(--accent);}
.sonder-btn-label{font-size:13px;color:var(--tx2);display:flex;align-items:center;gap:8px;}
.sonder-btn-label i{font-size:15px;}
.sonder-progress{display:flex;border:.5px solid var(--br);border-radius:var(--r-lg);overflow:hidden;}
.sp-step{flex:1;padding:8px 6px;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;text-align:center;border-right:.5px solid var(--br);color:var(--tx3);}
.sp-step:last-child{border-right:none;}
.sp-step i{font-size:16px;}
.sp-step.done{background:var(--accent-dark);color:white;}
.sp-step.next{background:rgba(255,107,43,.12);color:var(--accent);}
.info-row{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:.5px solid var(--br);min-height:52px;}
.info-row:last-child{border-bottom:none;}
.info-lbl{font-size:15px;color:var(--tx2);display:flex;align-items:center;gap:6px;min-width:140px;}
.info-lbl i{font-size:14px;}
.info-val{font-size:15px;font-weight:500;flex:1;text-align:right;}
.pruef-card{background:var(--accent-dark);border:none;border-radius:var(--r-lg);padding:12px 14px;display:flex;align-items:center;gap:12px;}
.pruef-result-item{background:var(--bg);border:.5px solid var(--br);border-radius:var(--r-lg);padding:10px 14px;display:flex;align-items:center;gap:12px;margin-bottom:6px;}
.pruef-versuch{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0;}
.pruef-best{background:#EAF3DE;color:#27500A;}
.pruef-nicht{background:#FCEBEB;color:#A32D2D;}
.gfa-row{display:flex;align-items:center;padding:11px 14px;border-bottom:.5px solid var(--br);}
.gfa-row:last-child{border-bottom:none;}
.gfa-label{flex:1;font-size:15px;color:var(--tx);}
.gfa-controls{display:flex;align-items:center;gap:10px;}
.gfa-count{font-size:17px;font-weight:600;min-width:28px;text-align:center;color:var(--tx);}
.gfa-btn{width:32px;height:32px;border-radius:50%;border:.5px solid var(--br2);background:var(--bg2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--tx2);font-family:inherit;line-height:1;}
.gfa-btn:active{transform:scale(.9);background:var(--accent);color:white;border-color:var(--accent);}
.stat-card{background:var(--bg);border:.5px solid var(--br);border-radius:var(--r-lg);padding:14px 16px;}
.stat-bar-wrap{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.stat-bar-label{font-size:12px;color:var(--tx2);min-width:28px;}
.stat-bar-bg{flex:1;height:8px;border-radius:4px;background:var(--bg3);}
.stat-bar-fill{height:8px;border-radius:4px;background:var(--accent);}
.stat-bar-val{font-size:12px;color:var(--tx2);min-width:28px;text-align:right;}
.month-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:.5px solid var(--br);flex-shrink:0;background:var(--bg);}
.month-label{font-size:17px;font-weight:600;}
.weekdays{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;padding:10px 12px 4px;flex-shrink:0;}
.wd{text-align:center;font-size:12px;font-weight:600;letter-spacing:.03em;}
.cal-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.cal-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;padding:4px 12px 12px;}
.cal-day{min-height:58px;border-radius:var(--r-md);padding:5px;cursor:pointer;border:.5px solid transparent;display:flex;flex-direction:column;align-items:center;gap:2px;}
.cal-day:active{background:var(--bg2);}
.cal-day.today{border-color:var(--accent);background:var(--accent);}
.cal-day.sel{background:rgba(255,107,43,.15);border-color:var(--accent);}
.cal-day.disabled{cursor:default;opacity:.25;pointer-events:none;}
.day-num{font-size:15px;font-weight:500;color:var(--tx);line-height:1;text-align:center;width:100%;}
.cal-day.today .day-num{color:white;}
.dot-row{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;}
.cdot{width:6px;height:6px;border-radius:50%;}
.cdot-r{background:#E24B4A;}.cdot-g{background:#639922;}.cdot-b{background:#378ADD;}
.spacer-day{min-height:58px;}
.termin-item{background:var(--bg);border:.5px solid var(--br);border-radius:var(--r-lg);padding:9px 12px;display:flex;align-items:center;gap:10px;}
.t-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0;}
.t-info{flex:1;}
.t-name{font-size:13px;font-weight:500;}
.t-sub{font-size:11px;color:var(--tx2);margin-top:1px;}
.t-del{background:none;border:none;cursor:pointer;color:var(--tx3);font-size:16px;padding:3px;display:flex;align-items:center;}
.t-del:active{color:#E24B4A;}
.cir-btn{width:32px;height:32px;border-radius:50%;border:.5px solid var(--br2);background:var(--bg2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--tx2);font-family:inherit;line-height:1;}
.cir-btn:active{transform:scale(.93);}
.notiz-area{width:100%;min-height:200px;border:none;background:transparent;font-size:20px;line-height:1.7;color:var(--tx);font-family:inherit;outline:none;resize:none;padding:0;}
.empty-hint{text-align:center;padding:24px 0;font-size:13px;color:var(--tx3);}
.err-border{outline:2px solid #E24B4A !important;border-radius:4px;}
.foto-circle{width:80px;height:80px;border-radius:50%;overflow:hidden;flex-shrink:0;position:relative;cursor:pointer;}
.foto-circle img{width:100%;height:100%;object-fit:cover;display:block;}
.foto-circle .foto-overlay,.foto-initials .foto-overlay{position:absolute;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;border-radius:50%;}
.foto-circle:active .foto-overlay,.foto-initials:active .foto-overlay{opacity:1;}
.foto-overlay i{color:white;font-size:22px;}
.foto-initials{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:600;flex-shrink:0;cursor:pointer;position:relative;}
.swipe-wrap{position:relative;border-radius:var(--r-lg);margin-bottom:8px;}
.swipe-del-bg{position:absolute;right:0;top:0;bottom:0;width:80px;background:#E24B4A;display:flex;align-items:center;justify-content:center;color:white;font-size:22px;border-radius:0 var(--r-lg) var(--r-lg) 0;}
.swipe-item{position:relative;transition:transform .2s ease;touch-action:pan-y;background:var(--bg);border-radius:var(--r-lg);width:100%;z-index:1;}
.swipe-item.swiped{transform:translateX(-80px);}
.ptr-wrap{position:relative;flex:1;overflow:hidden;display:flex;flex-direction:column;}
.ptr-indicator{position:absolute;top:-56px;left:0;right:0;height:56px;display:flex;align-items:center;justify-content:center;transition:top .2s ease;z-index:10;pointer-events:none;}
.ptr-spinner{width:28px;height:28px;border-radius:50%;border:2.5px solid rgba(255,107,43,.25);border-top-color:var(--accent);}
@keyframes ptr-spin{to{transform:rotate(360deg);}}
.ptr-spinner.spinning{animation:ptr-spin .7s linear infinite;}

/* ── IPAD OPTIMIERUNG ────────────────────────────────────────────────────────*/
@media (min-width: 768px) {
  body { background: var(--bg2); }
  .app { display: flex; flex-direction: row; height: 100vh; max-width: 100%; }
  #ipad-sidebar { width: 300px; min-width: 200px; max-width: 500px; flex-shrink: 0; border-right: 0.5px solid var(--br); display: flex; flex-direction: column; height: 100vh; background: var(--bg); position: relative; overflow: visible; }
  #ipad-resize-handle { position: absolute; right: -6px; top: 0; bottom: 0; width: 12px; cursor: col-resize; z-index: 100; background: transparent; display: flex; align-items: center; justify-content: center; }
  #ipad-resize-handle::after { content: ""; width: 4px; height: 40px; background: var(--br2); border-radius: 2px; transition: background 0.15s; }
  #ipad-resize-handle:hover::after { background: var(--accent); }
  #ipad-detail { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  .screen { display: flex !important; flex-direction: column; height: 100vh; }

  .topbar { padding: calc(var(--safe-top) + 14px) 28px 14px; }
  .topbar-title { font-size: 22px; }
  .btn-icon { font-size: 24px; min-width: 48px; min-height: 48px; }

  .scroll { padding: 20px 28px calc(var(--safe-bot) + 28px); gap: 18px; }

  .stat-num { font-size: 30px; }
  .stat-lbl { font-size: 13px; }

  .list-item { padding: 16px 20px; min-height: 80px; gap: 16px; }
  .avatar { width: 54px; height: 54px; font-size: 18px; }
  .item-name { font-size: 19px; }
  .item-sub { font-size: 15px; margin-top: 5px; }
  .badge { font-size: 14px; padding: 5px 12px; }

  .card-row { padding: 15px 20px; min-height: 58px; }
  .card-label { font-size: 17px; min-width: 150px; }

// ── SCHÜLERLISTE ──────────────────────────────────────────────────────────────
function renderListe(q="",sortMode="heute"){
  const td=todayStr();
  const heuteIds=new Set((termine[td]||[]).map(t=>t.sid));
  const basis=q?schueler.filter(s=>(s.vorname+" "+s.nachname+" "+(s.spitz||"")).toLowerCase().includes(q.toLowerCase())):schueler;

  function nextTerminDateTime(s){
    const all=Object.entries(termine)
      .filter(([d])=>d>=td)
      .flatMap(([d,ts])=>ts.filter(t=>t.sid===s.id).map(t=>d+"T"+(t.uhr||"00:00")));
    return all.sort()[0]||"9999";
  }

  const filtered=[...basis].sort((a,b)=>{
    if(sortMode==="termin"){
      return nextTerminDateTime(a).localeCompare(nextTerminDateTime(b));
    }
    const aH=heuteIds.has(a.id)?0:1;
    const bH=heuteIds.has(b.id)?0:1;
    return aH-bH;
  });
  let html=`<div class="screen active" id="scr-liste">
    <div class="topbar">
      <button class="btn-icon" onclick="renderDashboard()"><i class="ti ti-arrow-left"></i></button>
      <span class="topbar-title">Schüler</span>
      <button class="btn-icon" onclick="renderListe('','${sortMode==='heute'?'termin':'heute'}')" aria-label="Sortierung" title="${sortMode==='heute'?'Nach Termin sortieren':'Heute zuerst'}"><i class="ti ti-sort-ascending"></i></button>
      <button class="btn-icon" onclick="renderNeuSchueler()"><i class="ti ti-user-plus"></i></button>
    </div>
    <div class="scroll">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
        <span style="font-size:12px;color:var(--tx3)">${sortMode==="termin"?"↑ Nächster Termin":"↑ Heute zuerst"}</span>
        <button onclick="renderListe('${q}','${sortMode==='heute'?'termin':'heute'}')" style="font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;font-family:inherit;padding:0">Ändern</button>
      </div>
      <div class="search-wrap">
        <i class="ti ti-search search-icon"></i>
        <input type="search" placeholder="Suchen…" value="${q}" oninput="renderListe(this.value,'${sortMode}')" id="search-input" style="padding-right:${q?'40px':'12px'}"/>
        ${q?`<button onclick="renderListe('','${sortMode}')" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--tx3);font-size:18px;display:flex;align-items:center;padding:4px"><i class="ti ti-x"></i></button>`:""}
      </div>`;
  if(!filtered.length){
    html+=`<div class="empty-hint"><i class="ti ti-search" style="font-size:28px;display:block;margin:0 auto 8px"></i>Keine Schüler gefunden</div>`;
  }else{
    filtered.forEach(s=>{
      const bestanden=(s.pruefungen||[]).some(p=>p.bestanden===true);
      const dot=bestanden?"dot-green":s.prueftermin?"dot-amber":"dot-blue";
      html+=`<div class="swipe-wrap" id="wrap-${s.id}">
        <div class="swipe-del-bg" onclick="confirmDelete('${s.id}')"><i class="ti ti-trash"></i></div>
        <div class="swipe-item list-item" id="swipe-${s.id}" onclick="handleTap('${s.id}')" style="${bestanden?"border-left:3px solid #639922;":""}">
          ${s.foto?`<div class="avatar" style="overflow:hidden;flex-shrink:0"><img src="${s.foto}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/></div>`:`<div class="avatar av-${s.farbe}">${initials(s)}</div>`}
          <div class="item-info">
            <div class="item-name">${s.geschlecht==="w"?"👧":"👦"} ${s.vorname} ${s.nachname}${s.spitz?` <span style="color:var(--tx3);font-size:12px">«${s.spitz}»</span>`:""}</div>
            ${bestanden?`<div style="margin-top:3px"><span style="font-size:11px;color:#27500A;background:#EAF3DE;padding:2px 8px;border-radius:20px">✓ Bestanden</span></div>`:""}
            <div class="item-sub">${sortMode==="termin"?
            (()=>{const ndt=nextTerminDateTime(s);if(ndt==="9999")return"Kein Termin geplant";const nd=ndt.split("T")[0];const t=(termine[nd]||[]).find(t=>t.sid===s.id);return fmtDate(nd).day+". "+fmtDate(nd).mon+" "+fmtDate(nd).year+(t?" · "+t.uhr+" Uhr":"");})()
            :"Beginn "+fmtDate(s.beginn).day+". "+fmtDate(s.beginn).mon+" "+fmtDate(s.beginn).year

              (()=>{
                const td2=todayStr();
                const alleTermine=Object.entries(termine).filter(([d])=>d<=td2).flatMap(([d,ts])=>ts.filter(t=>t.sid===s.id));
                const geplant=Object.entries(termine).filter(([d])=>d>td2).flatMap(([d,ts])=>ts.filter(t=>t.sid===s.id));

        </div>
      </div>`;
    });
  }
  html+=`</div></div>`;
  document.getElementById("app").innerHTML=html;
  initSwipe();
  setTimeout(initPTR,50);
}

function initSwipe(){
  document.querySelectorAll(".swipe-item").forEach(el=>{
    const sid=el.id.replace("swipe-","");
    let startX,startY,dragging=false;
    el.addEventListener("touchstart",e=>{startX=e.touches[0].clientX;startY=e.touches[0].clientY;dragging=false;},{passive:true});
    el.addEventListener("touchmove",e=>{
      const dx=e.touches[0].clientX-startX,dy=e.touches[0].clientY-startY;
      if(!dragging&&Math.abs(dy)>Math.abs(dx)+5)return;
      dragging=true;
      const base=el.classList.contains("swiped")?-80:0;
      el.style.transition="none";
      el.style.transform=`translateX(${Math.max(Math.min(base+dx,0),-80)}px)`;
    },{passive:true});
    el.addEventListener("touchend",e=>{
      if(!dragging)return;
      const dx=e.changedTouches[0].clientX-startX;
      el.style.transition="transform .2s ease";
      if(el.classList.contains("swiped")){if(dx>30){el.style.transform="translateX(0)";el.classList.remove("swiped");}else el.style.transform="translateX(-80px)";}
      else{if(dx<-30){el.style.transform="translateX(-80px)";el.classList.add("swiped");}else el.style.transform="translateX(0)";}
      setTimeout(()=>{el.style.transition="";dragging=false;},220);
    });
  });
}
function handleTap(sid){
  const el=document.getElementById("swipe-"+sid);
  if(el&&el.classList.contains("swiped")){el.style.transition="transform .2s ease";el.style.transform="translateX(0)";el.classList.remove("swiped");return;}
  renderSchueler(sid);
}
function confirmDelete(sid){
  const s=getS(sid);if(!s)return;
  if(confirm(`${s.vorname} ${s.nachname} wirklich löschen?`)){schueler=schueler.filter(x=>x.id!==sid);saveAll();renderListe();}
}

          :`<div class="foto-initials av-${s.farbe}" style="${farbStyle(s.farbe)}" onclick="triggerFotoUpload('${s.id}')">${initials(s)}<div class="foto-overlay"><i class="ti ti-camera"></i></div></div>`

        <div>
          <div style="font-size:18px;font-weight:600">${s.vorname}${s.spitz?` <span style="font-size:14px;color:var(--tx3);font-weight:400">«${s.spitz}»</span>`:""} ${s.nachname}</div>
          <div style="font-size:13px;color:var(--tx2);margin-top:2px">Klasse ${s.klasse} · ${s.prufort}</div>

      <div class="stat-grid">
        <div class="stat-box"><div class="stat-lbl">Einheiten</div><div class="stat-num">${totalEinh}<span class="stat-unit">× 80 min</span></div></div>
        <div class="stat-box"><div class="stat-lbl">Sonderfahrten</div><div class="stat-num">${s.sonder.filter(Boolean).length}<span class="stat-unit">/ 3</span></div></div>

      <div><div class="sec-label">Stammdaten</div>

        <div class="info-row"><span class="info-lbl"><i class="ti ti-calendar-plus"></i>Beginn</span><span class="info-val">${fmtDate(s.beginn).day}. ${fmtDate(s.beginn).mon} ${fmtDate(s.beginn).year}</span></div>
        <div class="info-row"><span class="info-lbl"><i class="ti ti-book"></i>Theorie</span><span class="info-val" style="color:${s.theorie?"#3B6D11":"#993C1D"}">${s.theorie?"✓ Bestanden":"✗ Ausstehend"}</span></div>
        <div class="info-row"><span class="info-lbl"><i class="ti ti-map-pin"></i>Prüfort</span><span class="info-val">${s.prufort}</span></div>
        ${s.tel?`<div class="info-row"><span class="info-lbl"><i class="ti ti-brand-whatsapp"></i>WhatsApp</span>
          <a href="https://wa.me/${s.tel.replace(/[^0-9]/g,'')}" style="font-size:15px;font-weight:500;color:var(--accent);text-decoration:none" onclick="event.stopPropagation()">${s.tel}</a>
        </div>`:""}

      <div><div class="sec-label">Sonderfahrten</div>
      <div class="sonder-progress">
        ${SONDER.map((sf,i)=>{const done=s.sonder[i],next=!done&&i===nsi;return`<div class="sp-step ${done?"done":next?"next":""}"><i class="ti ${done?"ti-circle-check":next?"ti-circle-dashed":"ti-circle"}"></i>${sf.label}<span style="font-size:9px;opacity:.7">${sf.min} min</span></div>`;}).join("")}

      <div><div class="sec-label">Grundfahraufgaben</div>
      <div class="card">
        ${GRUNDFAHRAUFGABEN.map(g=>{const cnt=(s.gfa&&s.gfa[g.key])||0;return`<div class="gfa-row"><span class="gfa-label"><i class="ti ${g.icon}" style="font-size:16px;margin-right:8px;color:var(--tx3)"></i>${g.label}</span><div class="gfa-controls"><button class="gfa-btn" onclick="changeGFA('${s.id}','${g.key}',-1)">−</button><span class="gfa-count" id="gfa-${s.id}-${g.key}">${cnt}</span><button class="gfa-btn" onclick="changeGFA('${s.id}','${g.key}',1)">+</button></div></div>`;}).join("")}
      </div></div>

      <div><div class="sec-row"><div class="sec-label" style="margin:0">Fahrstunden</div><button class="fab-btn" onclick="renderNeuFahrstunde('${s.id}')"><i class="ti ti-plus"></i></button></div>
      ${(s.fahrstunden&&s.fahrstunden.length)?[...s.fahrstunden].sort((a,b)=>b.datum.localeCompare(a.datum)).slice(0,10).map((f,fi)=>{
        const fd=fmtDate(f.datum);
        const zukunft=f.datum>todayStr();
        const heute=f.datum===todayStr();
        const origIdx=s.fahrstunden.indexOf(f);
        return`<div class="termin-item" style="margin-bottom:6px;${zukunft?"opacity:.7":""}">
          <div style="display:flex;flex-direction:column;align-items:center;min-width:28px">
            <span style="font-size:15px;font-weight:600;color:${zukunft?"var(--accent)":"var(--tx)"}">${fd.day}</span>
            <span style="font-size:10px;color:var(--tx3)">${fd.mon}</span>
          </div>
          <div class="t-info">
            <div class="t-name">${f.typ==="pruef"?"Prüfungsfahrt":"Fahrstunde"}</div>
            <div class="t-sub">${f.uhr?f.uhr+" Uhr · ":""}${f.typ==="pruef"?"100 min":f.einh+" × 80 min"}</div>
          </div>
          <span style="font-size:11px;font-weight:500;padding:3px 8px;border-radius:20px;${
            zukunft?"background:rgba(255,107,43,.12);color:var(--accent)":
            heute?"background:#E6F1FB;color:#0C447C":
            "background:#EAF3DE;color:#27500A"
          }">${zukunft?"Geplant":heute?"Heute":"✓"}</span>
          <button class="btn-icon dark" style="font-size:17px;min-width:32px;min-height:32px" onclick="renderEditFahrstunde('${s.id}',${origIdx})"><i class="ti ti-edit"></i></button>
        </div>`;
      }).join(""):
      `<div class="empty-hint" style="padding:10px 0">Noch keine Fahrstunden</div>`}
      </div>

      <div><div class="sec-label">Prüftermin</div>
      ${s.prueftermin
        ?`<div class="pruef-card" style="cursor:pointer" onclick="showPruefResult('${s.id}','${s.prueftermin}',-1,'geplant')"><i class="ti ti-calendar-event" style="font-size:24px;color:var(--accent)"></i><div style="flex:1"><div style="font-size:15px;font-weight:600;color:white">${fmtDate(s.prueftermin).day}. ${fmtDate(s.prueftermin).mon} ${fmtDate(s.prueftermin).year}</div><div style="font-size:12px;color:rgba(255,255,255,.75);margin-top:2px">${s.pruefzeit?s.pruefzeit+" Uhr · ":""}${s.prufort} · Klasse ${s.klasse}</div></div><i class="ti ti-chevron-right" style="color:rgba(255,255,255,.5);font-size:16px"></i></div>`
        :`<div class="card"><div class="info-row"><span class="info-lbl"><i class="ti ti-calendar-x"></i>Prüftermin</span><span class="info-val" style="color:var(--tx3)">Noch nicht vergeben</span></div></div>`}
      </div>

      <div><div class="sec-row"><div class="sec-label" style="margin:0">Prüfungen</div>
        <button class="fab-btn" onclick="renderNeuPruefungInline('${s.id}')"><i class="ti ti-plus"></i></button>
      </div>
      ${(s.pruefungen&&s.pruefungen.length)?s.pruefungen.map((p,pi)=>{
        const fd=fmtDate(p.datum);
        const offen=p.bestanden===null||p.bestanden===undefined;
        const best=p.bestanden===true;
        const bgCol=best?"#EAF3DE":offen?"var(--bg3)":"#FCEBEB";
        const txCol=best?"#27500A":offen?"var(--tx2)":"#A32D2D";
        const label=offen?"Offen":best?"Bestanden ✓":"Nicht bestanden ✗";
        return`<div class="pruef-result-item" style="margin-bottom:6px">
          <div class="pruef-versuch" style="background:${bgCol};color:${txCol}">${p.versuch}</div>
          <div style="flex:1">
            <div style="font-size:14px;font-weight:500;color:var(--tx)">${p.versuch}. Prüfung · ${fd.day}. ${fd.mon} ${fd.year}${p.uhr?" · "+p.uhr+" Uhr":""}</div>
            <div style="font-size:12px;color:${txCol};margin-top:2px">${label}</div>
          </div>
          <button class="btn-icon dark" style="font-size:18px;min-width:36px;min-height:36px" onclick="renderEditPruefung('${s.id}',${pi})"><i class="ti ti-edit"></i></button>
        </div>`;
      }).join(""):
      `<div class="empty-hint" style="padding:10px 0">Noch keine Prüfung eingetragen</div>`}
      </div>

      <div><div class="sec-row"><div class="sec-label" style="margin:0">Notizen</div>
        <button class="fab-btn" onclick="addNotizItem('${s.id}')"><i class="ti ti-plus"></i></button>
      </div>
      <div class="card" id="notiz-list-${s.id}">
        ${(()=>{
          const items=Array.isArray(s.notiz)?s.notiz:(s.notiz?[{text:s.notiz,done:false}]:[]);
          if(!items.length)return`<div class="empty-hint" style="padding:14px 0">Tippe + für eine neue Notiz</div>`;
          return items.map((item,ni)=>`
            <div class="notiz-item" style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:.5px solid var(--br);">
              <label class="toggle-wrap" style="width:28px;height:28px;flex-shrink:0">
                <input type="checkbox" ${item.done?"checked":""} onchange="toggleNotiz('${s.id}',${ni},this.checked)"/>
                <div class="toggle-track" style="border-radius:50%"></div>
                <div class="toggle-thumb" style="width:22px;height:22px;top:3px;left:3px"></div>
              </label>
              <span style="flex:1;font-size:18px;color:var(--tx);${item.done?"text-decoration:line-through;color:var(--tx3)":""}" onclick="editNotizItem('${s.id}',${ni})">${item.text||"…"}</span>
              <button onclick="deleteNotizItem('${s.id}',${ni})" style="background:none;border:none;cursor:pointer;color:var(--tx3);font-size:16px;padding:4px"><i class="ti ti-x"></i></button>
            </div>`).join("");
        })()}
      </div></div>

    </div>
  </div>`;
  document.getElementById("app").innerHTML=html;
  setTimeout(initPTR,50);
}

function saveNotiz(sid,val){const s=getS(sid);if(!s)return;s.notiz=val;saveAll();}

function addNotizItem(sid){
  const s=getS(sid);if(!s)return;
  const text=prompt("Neue Notiz:");
  if(!text||!text.trim())return;
  if(!Array.isArray(s.notiz))s.notiz=s.notiz?[{text:s.notiz,done:false}]:[];
  s.notiz.push({text:text.trim(),done:false});
  saveAll();renderSchueler(sid);
}

function toggleNotiz(sid,idx,done){
  const s=getS(sid);if(!s)return;
  if(!Array.isArray(s.notiz))return;
  s.notiz[idx].done=done;
  saveAll();
  // update visual without full re-render
  const span=event.target.closest(".notiz-item").querySelector("span");
  if(span){span.style.textDecoration=done?"line-through":"";span.style.color=done?"var(--tx3)":"var(--tx)";}
}

function editNotizItem(sid,idx){
  const s=getS(sid);if(!s)return;
  if(!Array.isArray(s.notiz))return;
  const text=prompt("Notiz bearbeiten:",s.notiz[idx].text);
  if(text===null)return;
  s.notiz[idx].text=text.trim()||s.notiz[idx].text;
  saveAll();renderSchueler(sid);
}

function deleteNotizItem(sid,idx){
  const s=getS(sid);if(!s)return;
  if(!Array.isArray(s.notiz))return;
  s.notiz.splice(idx,1);
  saveAll();renderSchueler(sid);
}
function changeGFA(sid,key,d){const s=getS(sid);if(!s)return;if(!s.gfa)s.gfa={};s.gfa[key]=Math.max(0,(s.gfa[key]||0)+d);saveAll();const el=document.getElementById("gfa-"+sid+"-"+key);if(el)el.textContent=s.gfa[key];}

// ── SCHÜLER ANLEGEN/BEARBEITEN ────────────────────────────────────────────────
function renderNeuSchueler(fromSid){
  const s=fromSid?getS(fromSid):null;
  let selFarbe=s?s.farbe:"blue";
  const title=s?"Schüler bearbeiten":"Neuer Schüler";
  const back=s?`renderSchueler('${s.id}')`:"renderListe()";
  let html=`<div class="screen active" id="scr-neu">
    <div class="topbar">
      <button class="btn-icon" onclick="${back}"><i class="ti ti-arrow-left"></i></button>
      <span class="topbar-title">${title}</span>
    </div>
    <div class="scroll">
      <div id="toast-neu" class="toast"><i class="ti ti-circle-check" style="font-size:16px"></i><span id="toast-neu-msg"></span></div>
      <div><div class="sec-label">Name</div>
      <div class="card">
        <div class="card-row"><span class="card-label"><i class="ti ti-user"></i>Vorname</span><input type="text" id="n-vn" value="${s?s.vorname:""}" placeholder="Pflichtfeld"/></div>
        <div class="card-row"><span class="card-label"><i class="ti ti-user"></i>Nachname</span><input type="text" id="n-nn" value="${s?s.nachname:""}" placeholder="Pflichtfeld"/></div>
        <div class="card-row"><span class="card-label"><i class="ti ti-mood-smile"></i>Spitzname</span><input type="text" id="n-sp" value="${s?s.spitz:""}" placeholder="Optional"/></div>
        <div class="card-row"><span class="card-label"><i class="ti ti-user-circle"></i>Geschlecht</span>
          <div style="display:flex;gap:6px;justify-content:flex-end;flex:1">
            <button class="pill ${!s||s.geschlecht!=='w'?'active':''}" id="g-m" onclick="setGeschlecht('m')" style="font-size:14px;padding:6px 14px">👦 Junge</button>
            <button class="pill ${s&&s.geschlecht==='w'?'active':''}" id="g-w" onclick="setGeschlecht('w')" style="font-size:14px;padding:6px 14px">👧 Mädchen</button>
          </div>
        </div>
      </div></div>
      <div><div class="sec-label">Ausbildung</div>
      <div class="card">
        <div class="card-row"><span class="card-label"><i class="ti ti-phone"></i>Telefon</span><input type="tel" id="n-tel" value="${s?s.tel||'+49 ':'+49 '}" placeholder="+49 …"/></div>
        <div class="card-row"><span class="card-label"><i class="ti ti-calendar-plus"></i>Beginn</span><input type="date" id="n-bg" value="${s?s.beginn:new Date().toISOString().split("T")[0]}"/></div>
        <div class="card-row"><span class="card-label"><i class="ti ti-license"></i>Klasse</span>
          <select id="n-kl">${KLASSEN.map(k=>`<option value="${k}" ${s&&s.klasse===k?"selected":""}>${k}</option>`).join("")}</select>
        </div>
        <div class="card-row"><span class="card-label"><i class="ti ti-map-pin"></i>Prüfort</span>
          <select id="n-pf">
            <option value="">Auswählen…</option>
            ${PRUFORTE.map(p=>`<option value="${p}" ${s&&s.prufort===p?"selected":""}>${p}</option>`).join("")}
          </select>
        </div>
        <div class="card-row"><span class="card-label"><i class="ti ti-calendar-event"></i>Prüftermin</span><input type="date" id="n-pt" value="${s?s.prueftermin:""}"/></div>
        <div class="card-row"><span class="card-label"><i class="ti ti-clock"></i>Prüfzeit</span><input type="time" id="n-pt-uhr" value="${s&&s.pruefzeit?s.pruefzeit:'08:00'}"/></div>
        <div class="card-row"><span class="card-label"><i class="ti ti-book"></i>Theorie</span>
          <label class="toggle-wrap"><input type="checkbox" id="n-th" ${s&&s.theorie?"checked":""}/><div class="toggle-track"></div><div class="toggle-thumb"></div></label>
        </div>
      </div></div>

      <button class="btn-full" onclick="saveSchueler('${s?s.id:""}')">${s?"Änderungen speichern":"Schüler speichern"}</button>
      ${s?`<button class="btn-full danger" style="margin-top:6px" onclick="deleteSchueler('${s.id}')"><i class="ti ti-trash"></i> Schüler löschen</button>`:""}
    </div>
  </div>`;
  document.getElementById("app").innerHTML=html;
  window._selFarbe=selFarbe;
  window._geschlecht=s?s.geschlecht||'m':'m';
  setTimeout(initPTR,50);
}
function renderEditSchueler(sid){renderNeuSchueler(sid);}
function renderFarbDots(cid){const el=document.getElementById(cid);if(!el)return;el.innerHTML=FARBEN.map(f=>`<div class="farb-dot ${f.key===window._selFarbe?"sel":""}" style="background:${f.bg}" onclick="window._selFarbe='${f.key}';renderFarbDots('${cid}')"></div>`).join("");}

function setGeschlecht(g){
  window._geschlecht=g;
  const gm=document.getElementById("g-m");
  const gw=document.getElementById("g-w");
  if(gm)gm.classList.toggle("active",g==="m");
  if(gw)gw.classList.toggle("active",g==="w");
}
function saveSchueler(editSid){
  const vn=document.getElementById("n-vn").value.trim();
  const nn=document.getElementById("n-nn").value.trim();
  const kl=document.getElementById("n-kl").value;
  if(!vn||!nn){if(!vn)document.getElementById("n-vn").classList.add("err-border");if(!nn)document.getElementById("n-nn").classList.add("err-border");setTimeout(()=>document.querySelectorAll(".err-border").forEach(e=>e.classList.remove("err-border")),1500);return;}
  const pf=document.getElementById("n-pf").value;
  const pt=document.getElementById("n-pt").value;
  const th=document.getElementById("n-th").checked;
  const sp=document.getElementById("n-sp").value.trim();
  const bg=document.getElementById("n-bg").value;
  if(editSid){
    const s=getS(editSid);
    s.vorname=vn;s.nachname=nn;s.spitz=sp;s.geschlecht=window._geschlecht||'m';s.tel=document.getElementById('n-tel').value.trim();s.beginn=bg;s.klasse=kl;s.prufort=pf;s.prueftermin=pt;s.pruefzeit=document.getElementById('n-pt-uhr').value;s.theorie=th;s.farbe=window._selFarbe;
    saveAll();syncFahrstundenToKalender();renderSchueler(editSid);
  }else{
    const tel2=document.getElementById('n-tel').value.trim();const ptuhr=document.getElementById('n-pt-uhr').value;const ns={id:"s"+Date.now(),vorname:vn,nachname:nn,spitz:sp,geschlecht:window._geschlecht||'m',tel:tel2,farbe:window._selFarbe,klasse:kl,beginn:bg,prufort:pf,prueftermin:pt,pruefzeit:ptuhr,theorie:th,sonder:[false,false,false],notiz:"",fahrstunden:[],pruefungen:[],gfa:{laengs:0,rechts:0,umkehr:0,rueckwaerts:0,stopp_mit:0,stopp_ohne:0,stadtautobahn:0,strassenbahn:0},foto:null};
    schueler.push(ns);saveAll();
    document.getElementById("toast-neu-msg").textContent=vn+" "+nn+" wurde angelegt";
    document.getElementById("toast-neu").classList.add("show");
    setTimeout(()=>renderSchueler(ns.id),1600);
  }
}
function deleteSchueler(sid){
  const s=getS(sid);if(!s)return;
  if(confirm(`${s.vorname} ${s.nachname} wirklich löschen?`)){
    schueler=schueler.filter(x=>x.id!==sid);
    Object.keys(termine).forEach(d=>{
      termine[d]=termine[d].filter(t=>t.sid!==sid);
      if(!termine[d].length)delete termine[d];
    });
    saveAll();renderListe();
  }
}

// ── FAHRSTUNDE ────────────────────────────────────────────────────────────────
function renderNeuFahrstunde(sid){
  const s=getS(sid);if(!s)return;
  const nsi=nextSonder(s);
  let html=`<div class="screen active" id="scr-fahrt">
    <div class="topbar">
      <button class="btn-icon" onclick="renderSchueler('${sid}')"><i class="ti ti-x"></i></button>
      <span class="topbar-title">Fahrstunde · ${s.vorname}</span>
    </div>
    <div class="scroll">
      <div id="toast-fahrt" class="toast"><i class="ti ti-circle-check" style="font-size:16px"></i><span id="toast-fahrt-msg"></span></div>
      <div><div class="sec-label">Termin</div>
      <div class="card">
        <div class="card-row">
          <div style="display:flex;gap:0;width:100%">
            <button class="pill active" id="typ-normal" style="flex:1;border-radius:var(--r-md) 0 0 var(--r-md);justify-content:center;flex-direction:column;align-items:center;gap:2px;padding:10px 8px" onclick="setTypF('normal')">
              <i class="ti ti-steering-wheel" style="font-size:18px"></i><span style="font-size:12px">Fahrstunde</span><span style="font-size:10px;opacity:.7">80 min/Einh.</span>
            </button>
            <button class="pill" id="typ-pruef" style="flex:1;border-radius:0 var(--r-md) var(--r-md) 0;justify-content:center;flex-direction:column;align-items:center;gap:2px;padding:10px 8px;border-left:none" onclick="setTypF('pruef')">
              <i class="ti ti-license" style="font-size:18px"></i><span style="font-size:12px">Prüfungsfahrt</span><span style="font-size:10px;opacity:.7">100 min</span>
            </button>
          </div>
        </div>
        <div class="card-row"><span class="card-label"><i class="ti ti-calendar"></i>Datum</span><input type="date" id="f-dat" value="${todayStr()}"/></div>
        <div class="card-row"><span class="card-label"><i class="ti ti-clock"></i>Uhrzeit</span><input type="time" id="f-uhr" value="09:00"/></div>
        <div class="card-row" id="einh-row2">
          <span class="card-label"><i class="ti ti-clock"></i>Einheiten</span>
          <div style="display:flex;align-items:center;gap:8px;justify-content:flex-end;flex:1">
            <button class="cir-btn" onclick="changeEinh(-1)">−</button>
            <span id="einh-disp" style="font-size:16px;font-weight:500;min-width:72px;text-align:center">1 × 80 min</span>
            <button class="cir-btn" onclick="changeEinh(1)">+</button>
          </div>
        </div>
        <div class="card-row" id="pruef-row2" style="display:none"><span class="card-label"><i class="ti ti-clock"></i>Dauer</span><span class="card-val" style="flex:1;text-align:right;font-size:13px;color:var(--tx2)">100 min (fest)</span></div>
      </div></div>`;

  if(nsi!==-1){
    html+=`<div><div class="sec-label">Sonderfahrt dabei?</div><div class="card">
    ${SONDER.map((sf,i)=>{
      const done=s.sonder[i],isNext=i===nsi,locked=!done&&!isNext;

function saveFahrstunde(sid){
  const s=getS(sid);if(!s)return;
  const dat=document.getElementById("f-dat").value;if(!dat)return;
  const typ=window._fahrtTyp||"normal";
  const einh=window._fahrtEinh||1;
  const nsi=nextSonder(s);

  if(nsi!==-1){const sfEl=document.getElementById("sf-"+SONDER[nsi].key);if(sfEl&&sfEl.checked&&!s.sonder[nsi]){s.sonder[nsi]=true;sonderGemacht=SONDER[nsi].label;}}
  if(!s.fahrstunden)s.fahrstunden=[];
  const fuhr=document.getElementById("f-uhr")?document.getElementById("f-uhr").value:"09:00";
  s.fahrstunden.unshift({datum:dat,uhr:fuhr,einh,typ,sonder:sonderGemacht});
  // Sync to Kalender
  const kalMin = typ==="pruef" ? 100 : einh*80;
  if(!termine[dat])termine[dat]=[];
  // avoid duplicate
  const exists=termine[dat].find(t=>t.sid===s.id&&t.uhr===fuhr);
  if(!exists)termine[dat].push({sid:s.id,uhr:fuhr,min:kalMin,notiz:sonderGemacht||""});
  termine[dat].sort((a,b)=>a.uhr.localeCompare(b.uhr));
  saveAll();
  const msg=sonderGemacht?sonderGemacht+" abgeschlossen":"Fahrstunde gespeichert";
  document.getElementById("toast-fahrt-msg").textContent=msg;
  document.getElementById("toast-fahrt").classList.add("show");
  setTimeout(()=>renderSchueler(sid),1800);
}

function saveEditFahrstunde(sid,idx){
  const s=getS(sid);if(!s)return;
  const dat=document.getElementById("ef-dat").value;if(!dat)return;
  const uhr=document.getElementById("ef-uhr")?document.getElementById("ef-uhr").value:"09:00";
  const oldF=s.fahrstunden[idx];
  const newTyp=window._efahrtTyp||"normal";

  if(oldF.datum&&oldF.uhr&&termine[oldF.datum]){

  }
  s.fahrstunden[idx]={datum:dat,uhr:uhr,typ:newTyp,einh:newEinh,sonder:oldF.sonder};

  const newMin=newTyp==="pruef"?100:newEinh*80;

  saveAll();renderSchueler(sid);
}

function deleteEditFahrstunde(sid,idx){
  const s=getS(sid);if(!s)return;

    }
    s.fahrstunden.splice(idx,1);
    saveAll();renderSchueler(sid);
  }
}

function saveFoto(sid,input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    const img=new Image();
    img.onload=function(){
      const canvas=document.createElement("canvas");
      const MAX=300;let w=img.width,h=img.height;
      if(w>h){if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}}else{if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}}
      canvas.width=w;canvas.height=h;
      canvas.getContext("2d").drawImage(img,0,0,w,h);
      const s=getS(sid);if(s){s.foto=canvas.toDataURL("image/jpeg",.8);saveAll();renderSchueler(sid);}
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

let curYear=2026,curMonth=5,selDate=null;
function renderKalender(){const td=todayStr();const p=td.split("-");curYear=parseInt(p[0]);curMonth=parseInt(p[1]);selDate=td;buildKalender();}
function buildKalender(){
  let html=`<div class="screen active" id="scr-kal">

      <div class="wd" style="color:#E24B4A">Mo</div>

function renderCalGrid(){
  const grid=document.getElementById("cal-grid");if(!grid)return;
  grid.innerHTML="";
  const td=todayStr();
  const dim=new Date(curYear,curMonth,0).getDate();
  // collect only weekdays
  const weekdays=[];
  for(let d=1;d<=dim;d++)if(isWeekday(curYear,curMonth,d))weekdays.push(d);
  if(!weekdays.length)return;
  // offset: what weekday (Mon=0) is the first weekday of the month
  const firstDow=(new Date(curYear,curMonth-1,weekdays[0]).getDay()+6)%7;
  for(let i=0;i<firstDow;i++){const sp=document.createElement("div");sp.className="spacer-day";grid.appendChild(sp);}
  for(let d=1;d<=dim;d++){
    if(!isWeekday(curYear,curMonth,d))continue;
    const isWE=false;
    const key=toKey(curYear,curMonth,d);
    const el=document.createElement("div");el.className="cal-day";
    if(isBefore(curYear,curMonth,d))el.classList.add("disabled");
    if(key===td)el.classList.add("today");
    if(key===selDate)el.classList.add("sel");
    const dn=document.createElement("div");dn.className="day-num";dn.textContent=d;el.appendChild(dn);
    const t=termine[key];
    if(t&&t.length){
      const dr=document.createElement("div");dr.className="dot-row";
      t.slice(0,4).forEach(e=>{
        let cls="cdot-g";
        if(e.min===100)cls="cdot-r";
        else if(e.min===225||e.min===220||e.min===135)cls="cdot-b";
        const dot=document.createElement("div");
        dot.className="cdot "+cls;
        dr.appendChild(dot);
      });
      el.appendChild(dr);
    }
    el.setAttribute("onclick",`selDate='${key}';renderTagAnsicht('${key}')`);
    grid.appendChild(el);
  }
}

function changeKalMin(d){window._kalMin=Math.max(10,Math.min(300,window._kalMin+d));const el=document.getElementById("kal-min-disp");if(el)el.textContent=window._kalMin+" min";}

function setKTyp(typ){
  window._kalTyp=typ;
  ["normal","sonder","pruef"].forEach(t=>{const el=document.getElementById("ktyp-"+t);if(el)el.classList.toggle("active",t===typ);});
  const sr=document.getElementById("kal-sonder-row");
  if(sr)sr.style.display=typ==="sonder"?"":"none";
  if(typ==="normal")window._kalMin=80;
  else if(typ==="pruef")window._kalMin=100;
  const el=document.getElementById("kal-min-disp");if(el)el.textContent=window._kalMin+" min";
  kalUpdateEnd();
}

function setKSonder(key,min){
  SONDER.forEach(sf=>{const el=document.getElementById("ksf-"+sf.key);if(el)el.classList.toggle("active",sf.key===key);});
  window._kalMin=min;window._kalSonderKey=key;
  const el=document.getElementById("kal-min-disp");if(el)el.textContent=min+" min";
  kalUpdateEnd();
}

function kalUpdateEnd(){
  const uhr=document.getElementById("k-uhr");
  const endEl=document.getElementById("k-endzeit");
  if(!uhr||!endEl)return;
  const [h,m]=uhr.value.split(":").map(Number);
  const total=h*60+m+(window._kalMin||80);
  const eh=Math.floor(total/60)%24;
  const em=total%60;
  endEl.textContent=String(eh).padStart(2,"0")+":"+String(em).padStart(2,"0")+" Uhr";
}
function setKPers(typ){
  window._kalPers=typ;
  document.getElementById("kpers-schueler").classList.toggle("active",typ==="schueler");
  document.getElementById("kpers-auffrisch").classList.toggle("active",typ==="auffrisch");
  document.getElementById("k-schueler-row").style.display=typ==="schueler"?"":"none";

function saveKalTermin(date){
  const uhr=document.getElementById("k-uhr")?document.getElementById("k-uhr").value:"";
  if(!uhr)return;
  const isAuffrisch=(window._kalPers||"schueler")==="auffrisch";
  let sid;
  if(!isAuffrisch){
    sid=document.getElementById("k-sid")?document.getElementById("k-sid").value:"";
    if(!sid){
      const el=document.getElementById("k-sid");
      if(el){el.classList.add("err-border");setTimeout(()=>el.classList.remove("err-border"),1500);}
      return;
    }
  } else {
    const nameEl=document.getElementById("k-auffrisch-name");
    const name=nameEl?nameEl.value.trim():"";
    if(!name){
      if(nameEl){nameEl.classList.add("err-border");setTimeout(()=>nameEl.classList.remove("err-border"),1500);}
      return;
    }
    sid="__auffrisch__:"+name;

  const knotiz=document.getElementById('k-notiz');const notizVal=knotiz?knotiz.value.trim():'';

function renderStatistik(){
  const alle=schueler.flatMap(s=>(s.pruefungen||[]).filter(p=>p.bestanden!==null&&p.bestanden!==undefined).map(p=>({...p,sid:s.id,name:s.vorname+" "+s.nachname,klasse:s.klasse,prufort:s.prufort})));
  const gesamt=alle.length;
  const bestanden=alle.filter(p=>p.bestanden).length;
  const quote=gesamt?Math.round((bestanden/gesamt)*100):0;
  const v=[1,2,3,4].map(n=>({n,list:alle.filter(p=>p.versuch===n)}));
  const ortStats=PRUFORTE.map(o=>{
    const ps=schueler.filter(s=>s.prufort===o).flatMap(s=>(s.pruefungen||[]).filter(p=>p.bestanden!==null&&p.bestanden!==undefined));
    const tot=ps.length,best=ps.filter(p=>p.bestanden).length;
    return{ort:o,tot,best,quote:tot?Math.round((best/tot)*100):null};
  }).filter(o=>o.tot>0);
  const recent=[...alle].sort((a,b)=>b.datum.localeCompare(a.datum)).slice(0,8);

  let html=`<div class="screen active" id="scr-stat">
    <div class="topbar">
      <button class="btn-icon" onclick="renderDashboard()"><i class="ti ti-arrow-left"></i></button>
      <span class="topbar-title">Statistik</span>
    </div>
    <div class="scroll">
      <div class="stat-grid">
        <div class="stat-box accent"><div class="stat-lbl">Bestehensquote</div><div class="stat-num">${quote}<span class="stat-unit">%</span></div></div>
        <div class="stat-box"><div class="stat-lbl">Prüfungen gesamt</div><div class="stat-num">${gesamt}</div></div>
      </div>
      <div class="stat-grid">
        <div class="stat-box"><div class="stat-lbl">Bestanden</div><div class="stat-num" style="color:#27500A">${bestanden}</div></div>
        <div class="stat-box"><div class="stat-lbl">Nicht bestanden</div><div class="stat-num" style="color:#A32D2D">${gesamt-bestanden}</div></div>
      </div>`;

  if(gesamt===0){
    html+=`<div class="empty-hint"><i class="ti ti-chart-bar" style="font-size:32px;display:block;margin:0 auto 10px"></i>Noch keine Prüfungsdaten.<br>Ergebnisse über das Dashboard eintragen.</div>`;
  }else{
    html+=`<div><div class="sec-label">Nach Prüfungsversuch</div><div class="stat-card">`;
    v.filter(x=>x.list.length>0).forEach(x=>{
      const best=x.list.filter(p=>p.bestanden).length;
      const pct=x.list.length?Math.round((best/x.list.length)*100):0;
      html+=`<div class="stat-bar-wrap"><span class="stat-bar-label">${x.n}.</span><div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${pct}%"></div></div><span class="stat-bar-val">${pct}%</span><span style="font-size:11px;color:var(--tx3);min-width:36px">${best}/${x.list.length}</span></div>`;
    });
    html+=`</div></div>`;
    if(ortStats.length){
      html+=`<div><div class="sec-label">Nach Prüfort</div><div class="stat-card">`;
      ortStats.forEach(o=>{
        html+=`<div class="stat-bar-wrap"><span class="stat-bar-label" style="min-width:90px;font-size:11px">${o.ort.replace("DEKRA ","").replace("TÜV ","")}</span><div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${o.quote}%"></div></div><span class="stat-bar-val">${o.quote}%</span><span style="font-size:11px;color:var(--tx3);min-width:36px">${o.best}/${o.tot}</span></div>`;
      });
      html+=`</div></div>`;
    }
    if(recent.length){
      html+=`<div><div class="sec-label">Letzte Prüfungen</div>`;
      recent.forEach(p=>{
        const fd=fmtDate(p.datum);
        html+=`<div class="pruef-result-item"><div class="pruef-versuch ${p.bestanden?"pruef-best":"pruef-nicht"}">${p.versuch}</div><div style="flex:1"><div style="font-size:13px;font-weight:500;color:var(--tx)">${p.name}</div><div style="font-size:11px;color:var(--tx2);margin-top:2px">${p.versuch}. Prüfung · ${fd.day}. ${fd.mon} ${fd.year} · ${p.prufort}</div></div><span style="font-size:12px;font-weight:500;color:${p.bestanden?"#27500A":"#A32D2D"}">${p.bestanden?"✓":"✗"}</span></div>`;
      });
      html+=`</div>`;
    }
  }
  html+=`</div></div>`;
  document.getElementById("app").innerHTML=html;
  setTimeout(initPTR,50);
}

// ── TAGESANSICHT ─────────────────────────────────────────────────────────────
function renderTagAnsicht(date){
  const p=date.split("-");
  const fd=fmtDate(date);
  const wochentage=["So","Mo","Di","Mi","Do","Fr","Sa"];
  const dow=wochentage[new Date(date).getDay()];
  const t=termine[date]||[];
  const td=todayStr();

  let html=`<div class="screen active" id="scr-tag">
    <div class="topbar">
      <button class="btn-icon" onclick="buildKalender()"><i class="ti ti-arrow-left"></i></button>
      <span class="topbar-title">${dow}, ${fd.day}. ${fd.mon} ${fd.year}</span>
      <button class="btn-icon" onclick="renderNeuKalTermin('${date}')"><i class="ti ti-plus"></i></button>
    </div>
    <div class="scroll">`;

  if(!t.length){
    html+=`<div class="empty-hint"><i class="ti ti-calendar-off" style="font-size:32px;display:block;margin:0 auto 10px"></i>Keine Termine<br><span style="font-size:12px">Tippe + um einen Termin hinzuzufügen</span></div>`;
  } else {
    // Sort by time
    const sorted=[...t].sort((a,b)=>a.uhr.localeCompare(b.uhr));
    let totalMin=0;
    sorted.forEach((e,i)=>{
      const isAuffrisch2=e.sid&&e.sid.startsWith("__auffrisch__");
      const auffrischName=isAuffrisch2?e.sid.replace("__auffrisch__:",""):"";
      const s=isAuffrisch2?null:getS(e.sid);if(!s&&!isAuffrisch2)return;
      const nick=s&&s.spitz?` «${s.spitz}»`:"";

function ektUpdateEnd(){
  const uhr=document.getElementById("ekt-uhr");
  const endEl=document.getElementById("ekt-endzeit");
  if(!uhr||!endEl)return;
  const [h,m]=uhr.value.split(":").map(Number);
  const total=h*60+m+(window._etMin||80);
  const eh=Math.floor(total/60)%24;
  const em=total%60;
  endEl.textContent=String(eh).padStart(2,"0")+":"+String(em).padStart(2,"0")+" Uhr";
}

function setEKTyp(typ){
  ["normal","sonder","pruef"].forEach(t=>{const el=document.getElementById("ektyp-"+t);if(el)el.classList.toggle("active",t===typ);});
  const sr=document.getElementById("ek-sonder-row");
  if(sr)sr.style.display=typ==="sonder"?"flex":"none";
  if(typ==="normal"){window._etMin=80;}
  else if(typ==="pruef"){window._etMin=100;}
  const el=document.getElementById("et-min-disp");if(el)el.textContent=window._etMin+" min";
  ektUpdateEnd();
}

function setEKSonder(key,min){
  SONDER.forEach(sf=>{const el=document.getElementById("eksf-"+sf.key);if(el)el.classList.toggle("active",sf.key===key);});
  window._etMin=min;
  const el=document.getElementById("et-min-disp");if(el)el.textContent=min+" min";
  ektUpdateEnd();
}

function saveEktTermin(date,idx){
  if(!termine[date]||!termine[date][idx])return;
  termine[date][idx].sid=document.getElementById("ekt-sid").value;
  termine[date][idx].uhr=document.getElementById("ekt-uhr").value;
  termine[date][idx].min=window._etMin||80;
  termine[date][idx].notiz=document.getElementById("ekt-notiz").value.trim();
  termine[date].sort((a,b)=>a.uhr.localeCompare(b.uhr));
  saveAll();renderTagAnsicht(date);
}

function deleteEktTermin(date,idx){
  if(!termine[date])return;
  const t=termine[date][idx];
  const s=getS(t.sid);
  if(!confirm((s?s.vorname+" "+s.nachname:"Termin")+" · "+t.uhr+" Uhr wirklich löschen?"))return;
  termine[date].splice(idx,1);
  if(!termine[date].length)delete termine[date];
  saveAll();renderTagAnsicht(date);
}

// ── PULL TO REFRESH ───────────────────────────────────────────────────────────
function initPTR(){
  const scrollEl=document.querySelector(".scroll");if(!scrollEl)return;
  const parent=scrollEl.parentElement;
  let ptrWrap=parent.querySelector(".ptr-wrap");
  if(!ptrWrap){ptrWrap=document.createElement("div");ptrWrap.className="ptr-wrap";parent.insertBefore(ptrWrap,scrollEl);ptrWrap.appendChild(scrollEl);}
  let indicator=ptrWrap.querySelector(".ptr-indicator");
  if(!indicator){indicator=document.createElement("div");indicator.className="ptr-indicator";indicator.innerHTML='<div class="ptr-spinner" id="ptr-spinner"></div>';ptrWrap.insertBefore(indicator,scrollEl);}
  let startY=0,pulling=false,triggered=false;
  const THRESHOLD=72;
  scrollEl.addEventListener("touchstart",e=>{if(scrollEl.scrollTop===0){startY=e.touches[0].clientY;pulling=true;triggered=false;}},{passive:true});
  scrollEl.addEventListener("touchmove",e=>{
    if(!pulling)return;
    const dy=e.touches[0].clientY-startY;if(dy<=0){pulling=false;return;}
    const pull=Math.min(dy*.45,70);
    const spinner=document.getElementById("ptr-spinner");
    if(pull>10){indicator.style.top=(pull-56)+"px";if(spinner){spinner.style.transform=`rotate(${Math.round((pull/THRESHOLD)*270)}deg)`;spinner.style.borderTopColor=pull>=THRESHOLD?"var(--accent)":"rgba(255,107,43,.5)";}}
    if(pull>=THRESHOLD&&!triggered){triggered=true;const sp=document.getElementById("ptr-spinner");if(sp)sp.classList.add("spinning");}
  },{passive:true});
  scrollEl.addEventListener("touchend",e=>{
    if(!pulling)return;pulling=false;
    if(triggered){indicator.style.top="0px";setTimeout(()=>{const sp=document.getElementById("ptr-spinner");if(sp)sp.classList.remove("spinning");indicator.style.top="-56px";location.reload();},600);}
    else indicator.style.top="-56px";
  },{passive:true});
}

function exportDaten(){
  const data = { schueler, termine, exportiert: new Date().toISOString() };
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const datum = new Date().toISOString().split("T")[0];
  a.href = url;
  a.download = "fahrschule-backup-"+datum+".json";
  a.click();
  URL.revokeObjectURL(url);
}

function importDaten(input){
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    try {
      const data = JSON.parse(e.target.result);
      if(!data.schueler || !data.termine) {
        alert("Ungültige Backup-Datei."); return;
      }
      if(!confirm("Alle aktuellen Daten werden ersetzt. Fortfahren?")) return;
      schueler = data.schueler;
      termine = data.termine;
      saveAll();
      renderDashboard();
      alert("Daten erfolgreich wiederhergestellt.");
    } catch(err) {
      alert("Fehler beim Einlesen der Datei.");
    }
  };
  reader.readAsText(file);
  input.value = "";
}

// ── SYNC FAHRSTUNDEN → KALENDER ──────────────────────────────────────────────
function syncFahrstundenToKalender(){
  schueler.forEach(s=>{
    // Sync Fahrstunden
    (s.fahrstunden||[]).forEach(f=>{
      if(!f.datum)return;
      const uhr=f.uhr||"09:00";
      const min=f.typ==="pruef"?100:(f.einh||1)*80;
      if(!termine[f.datum])termine[f.datum]=[];
      const exists=termine[f.datum].find(t=>t.sid===s.id&&t.uhr===uhr);
      if(!exists){
        termine[f.datum].push({sid:s.id,uhr,min,notiz:f.sonder||""});
        termine[f.datum].sort((a,b)=>a.uhr.localeCompare(b.uhr));
      }
    });
    // Sync Prüftermin
    if(s.prueftermin){
      const uhr=s.pruefzeit||"08:00";
      if(!termine[s.prueftermin])termine[s.prueftermin]=[];
      const exists=termine[s.prueftermin].find(t=>t.sid===s.id&&t.uhr===uhr);
      if(!exists){
        termine[s.prueftermin].push({sid:s.id,uhr,min:100,notiz:"Prüfung"});
        termine[s.prueftermin].sort((a,b)=>a.uhr.localeCompare(b.uhr));
      }
    }
  });
  save("fs_termine",termine);
}

function renderIPadDashboard(){
  const td=todayStr();
  let anzeigeDatum=td, anzeigeLabel="Heute";
  const heuteT=(termine[td]||[]).sort((a,b)=>a.uhr.localeCompare(b.uhr));
  if(!heuteT.length){
    const alleKeys=Object.keys(termine).filter(d=>d>td).sort();
    if(alleKeys.length){ anzeigeDatum=alleKeys[0]; const fd2=fmtDate(anzeigeDatum); anzeigeLabel="Nächster Termin · "+fd2.day+". "+fd2.mon; }
  }
  const anzT=(termine[anzeigeDatum]||[]).sort((a,b)=>a.uhr.localeCompare(b.uhr));
  const allePruef=[];
  schueler.forEach(s=>{
    if(s.prueftermin&&s.prueftermin>=td){const ex=(s.pruefungen||[]).find(p=>p.datum===s.prueftermin);if(!ex)allePruef.push({sid:s.id,datum:s.prueftermin,versuch:null,pi:-1,typ:"geplant"});}
    (s.pruefungen||[]).forEach((p,pi)=>{if(p.bestanden===null||p.bestanden===undefined)allePruef.push({sid:s.id,datum:p.datum,versuch:p.versuch,pi,typ:"offen"});});
  });
  allePruef.sort((a,b)=>a.datum.localeCompare(b.datum));

  let html=`<div style="display:flex;flex-direction:column;height:100%">
    <div style="background:var(--accent-dark);padding:calc(var(--safe-top)+14px) 20px 14px;min-height:64px;display:flex;align-items:center;gap:8px;flex-shrink:0">
      <span style="font-size:20px;font-weight:600;color:white;flex:1"><i class="ti ti-steering-wheel" style="font-size:20px;margin-right:6px"></i>Fahrschule <span style="font-size:11px;opacity:0.5;font-weight:400">v1.8</span></span>
      <span id="sync-status" style="font-size:11px;color:rgba(255,255,255,0.6);transition:opacity 1s;opacity:0"></span>
      <button class="btn-icon" onclick="renderIPadKalender()" title="Kalender"><i class="ti ti-calendar"></i></button>
      <button class="btn-icon" onclick="renderIPadStatistik()" title="Statistik"><i class="ti ti-chart-bar"></i></button>
    </div>
    <div style="flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:16px">
      <div class="stat-grid">
        <div class="stat-box accent"><div class="stat-lbl">Aktive Schüler</div><div class="stat-num">${schueler.length}</div></div>
        <div class="stat-box"><div class="stat-lbl">Heute gefahren</div><div class="stat-num">${todayTotalMin()}<span class="stat-unit">min</span></div></div>
      </div>
      <div><div class="sec-label">${anzeigeLabel}</div>`;

  if(anzT.length){
    anzT.forEach((t,ti)=>{
      const s=getS(t.sid);if(!s)return;
      const nick=s.spitz?` «${s.spitz}»`:"";
      const endT=(()=>{const [h,m]=t.uhr.split(":").map(Number);const tot=h*60+m+t.min;return String(Math.floor(tot/60)%24).padStart(2,"0")+":"+String(tot%60).padStart(2,"0");})();
      html+=`<div class="list-item" style="margin-bottom:6px;cursor:pointer" onclick="renderIPadSchueler('${s.id}')">
        ${s.foto?`<div class="avatar" style="overflow:hidden"><img src="${s.foto}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/></div>`:`<div class="avatar av-${s.farbe}">${initials(s)}</div>`}
        <div class="item-info"><div class="item-name">${s.vorname}${nick}</div><div class="item-sub">${t.uhr}–${endT} Uhr · ${t.min} min${t.notiz?" · "+t.notiz:""}</div></div>
        <span class="badge badge-${s.klasse}">${s.klasse}</span>
      </div>`;
    });
  } else {
    html+=`<div style="padding:12px 0;font-size:14px;color:var(--tx3)">Keine Termine</div>`;
  }

  if(allePruef.length){
    html+=`</div><div><div class="sec-label">Prüfungen</div>`;
    allePruef.forEach(ep=>{
      const s2=getS(ep.sid);if(!s2)return;
      const fd=fmtDate(ep.datum);
      const vergangen=ep.datum<td;
      const s2pz=s2.pruefzeit&&ep.typ==="geplant"?s2.pruefzeit+" Uhr · ":"";
      const sub=ep.typ==="geplant"?`${s2pz}Klasse ${s2.klasse} · ${s2.prufort}`:`${ep.versuch}. Prüfung · Ergebnis ausstehend`;
      html+=`<div class="list-item" style="margin-bottom:6px;cursor:pointer" onclick="showPruefResult('${ep.sid}','${ep.datum}',${ep.pi},'${ep.typ}');renderIPadDashboard()">
        <span class="status-dot" style="background:${vergangen?"var(--accent)":"#378ADD"}"></span>
        <div class="item-info"><div class="item-name">${s2.vorname} ${s2.nachname}</div><div class="item-sub">${sub}</div></div>
        <span style="font-size:13px;color:var(--tx2);font-weight:500">${fd.day}. ${fd.mon}${vergangen?" ⚠️":""}</span>
      </div>`;
    });
  }

  html+=`</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <button class="btn-full" onclick="renderIPadKalender()"><i class="ti ti-calendar"></i> Kalender</button>
        <button class="btn-full" onclick="renderIPadStatistik()"><i class="ti ti-chart-bar"></i> Statistik</button>
      </div>
      <button class="btn-full gruen" onclick="exportDaten()"><i class="ti ti-download"></i> Daten sichern</button>
      <button class="btn-full" style="background:#E6F1FB;border-color:#85B7EB;color:#0C447C" onclick="document.getElementById('import-input-ipad').click()"><i class="ti ti-upload"></i> Daten wiederherstellen</button>
      <input type="file" id="import-input-ipad" accept=".json" style="display:none" onchange="importDaten(this)"/>
    </div>
  </div>`;
  ipadDetail(html);
}

// Sidebar resize
function initSidebarResize(){
  const handle=document.getElementById("ipad-resize-handle");
  const sidebar=document.getElementById("ipad-sidebar");
  if(!handle||!sidebar)return;
  let startX=0,startW=0;
  handle.addEventListener("pointerdown",e=>{
    startX=e.clientX;startW=sidebar.offsetWidth;
    handle.setPointerCapture(e.pointerId);
    document.body.style.userSelect="none";
    e.preventDefault();
  });
  handle.addEventListener("pointermove",e=>{
    if(e.buttons===0)return;
    const w=Math.max(200,Math.min(520,startW+e.clientX-startX));
    sidebar.style.width=w+"px";
  });
  handle.addEventListener("pointerup",()=>{
    document.body.style.userSelect="";
  });
  handle.style.cursor="col-resize";
}
