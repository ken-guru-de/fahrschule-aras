        <span style="font-size:13px;color:${done?'#27A843':'var(--tx2)'}">${totalMin}/${sf.required} min</span>
      </div>
      ${sfTermine.map(t=>{const fd=fmtDate(t.datum);return`<div style="display:flex;justify-content:space-between;padding:2px 0 2px 30px;font-size:12px;color:var(--tx2)"><span>${fd.day}. ${fd.mon} ${fd.year}</span><span>${t.min} min</span></div>`;}).join('')}
    </div>`;
  });
  html+='</div>';
  return html;
}

function toggleSonderSchueler(sid,key,min){
  const s=getS(sid);if(!s)return;
  if(!s.sonder||Array.isArray(s.sonder))s.sonder={ueberland:0,autobahn:0,nacht:0};
  if(!s.manualSonder)s.manualSonder={};
  const isDone=(s.sonder[key]||0)>=min;
  s.sonder[key]=isDone?0:min;
  s.manualSonder[key]=s.sonder[key]; // store explicit override
  saveAll();
  const icon=document.getElementById("sf-icon-"+key);
  const label=document.getElementById("sf-label-"+key);
  const inp=document.getElementById("sf-"+key);
  if(icon){icon.className="ti "+(isDone?"ti-square":"ti-checkbox");icon.style.color=isDone?"var(--tx3)":"#27A843";}
  if(label){label.style.textDecoration=isDone?"none":"line-through";label.style.color=isDone?"var(--tx)":"var(--tx3)";}
  if(inp)inp.value=isDone?0:min;
}

function toggleSonderEdit(key,min){
  const inp=document.getElementById("sf-"+key);
  const icon=document.getElementById("sf-icon-"+key);
  if(!inp)return;
  const cur=parseInt(inp.value)||0;
  const next=cur>=min?0:min;
  inp.value=next;
  if(icon){icon.className="ti "+(next>=min?"ti-checkbox":"ti-square");icon.style.color=next>=min?"var(--accent)":"var(--tx3)";}
}

function changeGFADash(sid,key,d){
  const s=getS(sid);if(!s)return;
  if(!s.gfa)s.gfa={};
  s.gfa[key]=Math.max(0,(s.gfa[key]||0)+d);
  saveAll();
  const el=document.getElementById("gfa-"+sid+"-"+key+"-d");
  if(el)el.textContent=s.gfa[key];
}

function toggleFahrstundenDash(sid, type) {
  var el = document.getElementById("fahr-list-" + sid);
  if (!el) return;
  var showing = el.dataset.showing === type;
  if (showing) { el.style.display="none"; el.dataset.showing=""; return; }
  el.dataset.showing = type;
  el.style.display = "block";
  var td = todayStr();
  var wt = ["So","Mo","Di","Mi","Do","Fr","Sa"];
  var entries;
  if (type === "past") {
    entries = Object.entries(termine)
      .filter(function(kv){return kv[0]<td;})
      .flatMap(function(kv){return kv[1].filter(function(t){return t.sid===sid;}).map(function(t){return Object.assign({datum:kv[0]},t);});})
      .sort(function(a,b){return b.datum.localeCompare(a.datum);});
  } else {
    entries = Object.entries(termine)
      .filter(function(kv){return kv[0]>=td;})
      .flatMap(function(kv){return kv[1].filter(function(t){return t.sid===sid;}).map(function(t){return Object.assign({datum:kv[0]},t);});})
      .sort(function(a,b){
        var aP=a.typ==="pruef"?0:1, bP=b.typ==="pruef"?0:1;
        if(aP!==bP)return aP-bP;
        return a.datum.localeCompare(b.datum)||(a.uhr||"").localeCompare(b.uhr||"");
      });
  }
  el.innerHTML = "";
  if (!entries.length) {
    el.innerHTML = '<div style="padding:12px 16px;font-size:14px;color:var(--tx3)">Keine Eintr\u00e4ge</div>';
    return;
  }
  var wrap = document.createElement("div");
  wrap.style.cssText = "border-radius:14px;overflow:hidden;border:.5px solid var(--br2);margin-bottom:4px";
  entries.forEach(function(e) {
    var fd = fmtDate(e.datum);
    var dow = wt[new Date(e.datum).getDay()];
    var isPruef = e.typ === "pruef";
    var realIdx = (termine[e.datum]||[]).findIndex(function(t){return t.sid===e.sid&&t.uhr===e.uhr&&t.min===e.min;});
    var row = document.createElement("div");
    row.style.cssText = "display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:.5px solid var(--br2);cursor:pointer;background:"+(isPruef?"rgba(226,75,74,0.06)":"var(--bg)");
    var left = document.createElement("span");
    left.style.cssText = "font-size:15px;color:"+(isPruef?"#E24B4A":"var(--tx2)");
    left.textContent = dow+" "+fd.day+". "+fd.mon+(isPruef?" \uD83C\uDFAF":"");
    var right = document.createElement("div");
    right.style.cssText = "display:flex;align-items:center;gap:10px";
    var timeSpan = document.createElement("span");
    timeSpan.style.cssText = "font-size:15px;font-weight:"+(isPruef?600:400)+";color:"+(isPruef?"#E24B4A":"var(--tx)");
    timeSpan.textContent = (e.uhr||"")+" \u00B7 "+e.min+" min";
    var icon = document.createElement("i");
    icon.className = "ti ti-pencil";
    icon.style.cssText = "font-size:14px;color:var(--tx3)";
    right.appendChild(timeSpan); right.appendChild(icon);
    row.appendChild(left); row.appendChild(right);
    row.addEventListener("click", (function(datum, idx){
      return function(){ AppState.et.backSid=sid; renderEditDashTermin(datum,idx); };
    })(e.datum, realIdx));
    wrap.appendChild(row);
  });
  el.appendChild(wrap);
}

// ── STATISTIK ─────────────────────────────────────────────────────────────────
function renderAbrechnung(weekOffset=0){
  const satz=getAbrechnungSatz();
  const td=todayStr();
  const now=new Date();
  const moK=["Jan","Feb","M\u00e4r","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];
  const moLang=["Januar","Februar","M\u00e4rz","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];
  function toEuro(min){return((min/60)*satz).toFixed(2).replace('.',',')+" \u20ac";}
  function getMin(prefix){return Object.entries(termine).reduce((sum,[d,ts])=>{if(d.startsWith(prefix))return sum+ts.reduce((a,e)=>a+(e.min||0),0);return sum;},0);}
  // Tag
  const tagMin=getMin(td);
  const tagName=now.getDate()+". "+moK[now.getMonth()];
  // Woche Mo-Fr (navigierbar)
  const baseDate=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const todayDow=(baseDate.getDay()+6)%7;
  baseDate.setDate(baseDate.getDate()-todayDow+weekOffset*7);
  const baseDateStr=toKey(baseDate.getFullYear(),baseDate.getMonth()+1,baseDate.getDate());
  const wocheMin=Object.entries(termine).reduce((sum,[d,ts])=>{
    const diff=Math.round((new Date(d)-new Date(baseDateStr))/86400000);
    if(diff>=0&&diff<=4)return sum+ts.reduce((a,e)=>a+(e.min||0),0);
    return sum;
  },0);
  const wkEnd=new Date(baseDate);wkEnd.setDate(wkEnd.getDate()+4);
  const wkLabel=baseDate.getDate()+". \u2013 "+wkEnd.getDate()+". "+moK[wkEnd.getMonth()];
  const weekDays=[];
  const wtN=["Mo","Di","Mi","Do","Fr"];
  for(let i=0;i<5;i++){
    const d2=new Date(baseDate);d2.setDate(d2.getDate()+i);
    const ds=toKey(d2.getFullYear(),d2.getMonth()+1,d2.getDate());
    const min=(termine[ds]||[]).reduce((a,e)=>a+(e.min||0),0);
    weekDays.push({name:wtN[i],ds,min,isToday:ds===td});
  }
  const maxDayMin=Math.max(...weekDays.map(x=>x.min),1);
  // Monat & Jahr
  const monatStr=td.substring(0,7);
  const jahrStr=td.substring(0,4);
  const monatMin=getMin(monatStr);
  const jahrMin=getMin(jahrStr);
  // Monatsverlauf
  const allMonths={};
  Object.entries(termine).forEach(([d,ts])=>{const m=d.substring(0,7);if(!allMonths[m])allMonths[m]=0;allMonths[m]+=ts.reduce((a,e)=>a+(e.min||0),0);});
  const sortedMonths=Object.entries(allMonths).sort((a,b)=>b[0].localeCompare(a[0]));
  const maxMonthMin=sortedMonths[0]?.[1]||1;
  const html=`<div class="screen active" id="scr-abrech">
    <div class="topbar">
      <button class="btn-icon" onclick="renderDashboard()"><i class="ti ti-arrow-left"></i></button>
      <span class="topbar-title"><i class="ti ti-receipt" style="font-size:18px;margin-right:6px"></i>Abrechnung</span>
    </div>
    <div class="scroll">
      <!-- 4 Kacheln -->
      <div class="stat-grid" style="margin-bottom:10px">
        <div class="stat-box accent" style="text-align:center">
          <div class="stat-lbl">HEUTE \u00b7 ${tagName}</div>
          <div style="font-size:26px;font-weight:700;color:white;margin-top:4px">${toEuro(tagMin)}</div>
          <div style="font-size:13px;color:rgba(255,255,255,0.7);margin-top:3px">${tagMin} min</div>
        </div>
        <div class="stat-box" style="text-align:center">
          <div class="stat-lbl">WOCHE</div>
          <div style="font-size:26px;font-weight:700;color:#E24B4A;margin-top:4px">${toEuro(wocheMin)}</div>
          <div style="font-size:13px;color:var(--tx3);margin-top:3px">${wocheMin} min</div>
        </div>
        <div class="stat-box" style="text-align:center">
          <div class="stat-lbl">${moLang[now.getMonth()].toUpperCase()}</div>
          <div style="font-size:26px;font-weight:700;color:#E24B4A;margin-top:4px">${toEuro(monatMin)}</div>
          <div style="font-size:13px;color:var(--tx3);margin-top:3px">${monatMin} min</div>
        </div>
        <div class="stat-box" style="text-align:center">
          <div class="stat-lbl">${jahrStr}</div>
          <div style="font-size:26px;font-weight:700;color:#E24B4A;margin-top:4px">${toEuro(jahrMin)}</div>
        </div>
      </div>
      <!-- Woche Mo-Fr mit Navigation -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;padding:0 2px">
        <button onclick="renderAbrechnung(${weekOffset-1})" style="background:none;border:none;cursor:pointer;color:var(--accent);font-size:22px;padding:4px 10px"><i class="ti ti-chevron-left"></i></button>
        <span style="font-size:14px;font-weight:600;color:var(--tx)">Mo\u2013Fr \u00b7 ${wkLabel}${weekOffset===0?" \u00b7 diese Woche":""}</span>
        <button onclick="renderAbrechnung(${weekOffset+1})" style="background:none;border:none;cursor:pointer;color:${weekOffset<0?"var(--accent)":"var(--tx3)"};font-size:22px;padding:4px 10px"><i class="ti ti-chevron-right"></i></button>
      </div>
      <div class="stat-card" style="margin-bottom:10px">
        ${weekDays.map(d=>`<div style="margin-bottom:10px;cursor:pointer" onclick="renderTagAnsicht('${d.ds}')">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px">
            <span style="font-size:14px;font-weight:${d.isToday?"700":"400"};color:${d.isToday?"var(--accent)":"var(--tx)"}">${d.name} ${parseInt(d.ds.split("-")[2])}.</span>
            <span style="font-size:13px;color:var(--tx2)">${d.min?d.min+" min \u00b7 "+toEuro(d.min):"\u2013"}</span>
          </div>
          ${d.min?`<div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${Math.round((d.min/maxDayMin)*100)}%"></div></div>`:""}
        </div>`).join("")}
      </div>
      <!-- Monatsverlauf -->
      <div><div class="sec-label">Monatsverlauf</div>
      <div class="stat-card">
        ${sortedMonths.map(([m,min])=>{
          const [y,mo]=m.split("-");
          const mName=moK[parseInt(mo)-1];
          const isCurrent=m===monatStr;
          return`<div style="margin-bottom:14px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
              <span style="font-size:14px;font-weight:${isCurrent?"700":"400"};color:${isCurrent?"var(--accent)":"var(--tx)"}">${mName} ${y}</span>
              <div style="text-align:right">
                <div style="font-size:15px;font-weight:700;color:${isCurrent?"#E24B4A":"var(--tx)"}">${toEuro(min)}</div>
                <div style="font-size:11px;color:var(--tx3)">${min} min</div>
              </div>
            </div>
            <div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${Math.round((min/maxMonthMin)*100)}%"></div></div>
          </div>`;
        }).join("")}
      </div></div>
      <!-- Einstellungen -->
      <div><div class="sec-label">Einstellungen</div>
      <div class="card">
        <div class="card-row">
          <span class="card-label"><i class="ti ti-currency-euro"></i>Satz / 60 min</span>
          <div style="display:flex;align-items:center;gap:8px;justify-content:flex-end;flex:1">
            <input type="number" id="satz-input" value="${satz}" min="1" max="999" step="0.5" onfocus="this.select()"
              style="width:80px;text-align:center;border:.5px solid var(--br2);border-radius:6px;background:var(--bg2);font-size:17px;color:var(--tx);padding:6px"
              onchange="saveSatz(this.value)"/>
            <span style="font-size:15px;color:var(--tx2)">\u20ac</span>
          </div>
        </div>
      </div></div>
    </div>
  </div>`;
  renderApp(html);
  setTimeout(initPTR,50);
}

function getAbrechnungSatz(){return parseFloat(localStorage.getItem("fs_satz")||"25");}
function saveSatz(val){const v=parseFloat(val);if(!isNaN(v)&&v>0){localStorage.setItem("fs_satz",String(v));renderAbrechnung();}}
function getKW(date){const d=new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));const dayNum=d.getUTCDay()||7;d.setUTCDate(d.getUTCDate()+4-dayNum);const yearStart=new Date(Date.UTC(d.getUTCFullYear(),0,1));return Math.ceil((((d-yearStart)/86400000)+1)/7);}

function exportMonatPDF(monatStr){
  const satz=getAbrechnungSatz();
  const [y,m]=monatStr.split('-');
  const monatName=["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"][parseInt(m)-1];
  const dim=new Date(parseInt(y),parseInt(m),0).getDate();
  function toEuro(min){return((min/60)*satz).toFixed(2).replace('.',',')+" €";}
  function toStd(min){const h=Math.floor(min/60);const mm=min%60;return h+"h "+String(mm).padStart(2,"0")+"min";}
  const wochentage=["So","Mo","Di","Mi","Do","Fr","Sa"];
  let rows='';let total=0;
  for(let d=1;d<=dim;d++){
    const ds=toKey(parseInt(y),parseInt(m),d);
    const date=new Date(parseInt(y),parseInt(m)-1,d);
    const dow=date.getDay();
    if(dow===0||dow===6)continue;
    const min=(termine[ds]||[]).reduce((a,t)=>a+(t.min||0),0);
    total+=min;
    rows+=`<tr style="background:${min?'#fff':'#f9f9f9'}">
      <td style="padding:14px 16px;border-bottom:1px solid #eee;color:#666">${wochentage[dow]}</td>
      <td style="padding:14px 16px;border-bottom:1px solid #eee;font-weight:600">${d}. ${monatName}</td>
      <td style="padding:14px 16px;border-bottom:1px solid #eee;text-align:right">${min?min+' min':'-'}</td>
      <td style="padding:14px 16px;border-bottom:1px solid #eee;text-align:right">${min?toStd(min):'-'}</td>
      <td style="padding:14px 16px;border-bottom:1px solid #eee;text-align:right;color:${min?'#E24B4A':'#999'}">${min?toEuro(min):'-'}</td>
    </tr>`;
  }
  const html=`<!DOCTYPE html><html><head><meta charset="utf-8">
  <title>Abrechnung ${monatName} ${y}</title>
  <style>body{font-family:-apple-system,sans-serif;padding:20px;color:#333}
  h1{font-size:26px;margin-bottom:4px}h2{font-size:18px;color:#666;font-weight:normal;margin-bottom:20px}
  table{width:100%;border-collapse:collapse;font-size:20px}th{padding:14px 16px;background:#FF6B2B;color:white;text-align:left;font-size:19px}
  td{font-size:20px}
  .total{font-weight:700;font-size:23px;padding:16px;text-align:right;border-top:2px solid #FF6B2B}
  @media print{button{display:none}}</style></head>
  <body>
  <h1>Fahrschule Aras — Abrechnung ${monatName} ${y}</h1>
  <h2>Satz: ${satz} € / 60 min</h2>
  <table><tr><th>Tag</th><th>Datum</th><th>Minuten</th><th>Stunden</th><th>Verdienst</th></tr>
  ${rows}
  <tr><td colspan="2" class="total">Gesamt</td>
  <td class="total">${total} min</td>
  <td class="total">${toStd(total)}</td>
  <td class="total" style="color:#E24B4A">${toEuro(total)}</td></tr>
  </table>
  <br><div style="display:flex;flex-direction:column;gap:12px;margin-top:16px"><button onclick="window.print()" style="background:#FF6B2B;color:white;border:none;padding:52px 16px;border-radius:18px;font-size:24px;font-weight:700;cursor:pointer;width:100%">🖨️ Drucken / Als PDF speichern</button><button onclick="window.close()" style="background:#eee;color:#333;border:none;padding:52px 16px;border-radius:18px;font-size:24px;font-weight:700;cursor:pointer;width:100%">✕ Schließen</button></div>
  </body></html>`;
  const w=window.open('','_blank');
  w.document.write(html);
  w.document.close();
}

(async()=>{
  try{
    // Korrektur 1: Versuchsnummern chronologisch neu vergeben
    schueler.forEach(s=>{
      if(s.pruefungen&&s.pruefungen.length>1){
        s.pruefungen.sort((a,b)=>a.datum.localeCompare(b.datum));
        s.pruefungen.forEach((p,i)=>{p.versuch=i+1;});
      }
    });
    // Korrektur 2: Prüfungen entfernen die keinen echten pruef-Kalendereintrag haben
    // und kein Ergebnis (bestanden/nicht bestanden) gesetzt haben — nur "Geister"
    schueler.forEach(s=>{
      if(!s.pruefungen||!s.pruefungen.length)return;
      s.pruefungen=s.pruefungen.filter(p=>{
        // Prüfung mit gesetztem Ergebnis immer behalten
        if(p.bestanden===true||p.bestanden===false)return true;
        // Prüfen ob ein echter pruef-Eintrag im Kalender existiert
        const kalEintrag=(termine[p.datum]||[]).find(t=>
          t.sid===s.id&&t.typ==="pruef"
        );
        return !!kalEintrag;
      });
      // Versuchsnummern nach dem Filter neu vergeben
      s.pruefungen.sort((a,b)=>a.datum.localeCompare(b.datum));
      s.pruefungen.forEach((p,i)=>{p.versuch=i+1;});
    });
    syncKalenderToFahrstunden();
    save("fs_schueler",schueler);
  }catch(e){console.error("sync error:",e);}
  try{
    if(!localStorage.getItem("fs_schueler")&&schueler.length===0){
      document.getElementById("app").innerHTML=`
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px;text-align:center;gap:16px">
          <i class="ti ti-steering-wheel" style="font-size:64px;color:var(--accent)"></i>
          <div style="font-size:22px;font-weight:700">Fahrschule</div>
          <div style="font-size:14px;color:var(--tx2);line-height:1.5">Keine Daten gefunden.<br><br>
            <strong>So geht es:</strong><br>
            1. Öffne die JSON-Sicherung in der Dateien-App<br>
            2. Tippe lange → Alles auswählen → Kopieren<br>
            3. Komm zurück und tippe auf den Button:
          </div>
          <button onclick="importDatenPaste()" style="background:var(--accent);color:white;border:none;border-radius:12px;padding:16px 28px;font-size:17px;cursor:pointer;font-family:inherit;width:100%;margin-top:8px">
            <i class="ti ti-clipboard"></i> JSON hier einfügen
          </button>
          <div style="font-size:12px;color:var(--tx3)">oder</div>
          <button onclick="document.getElementById('import-input-boot').click()" style="background:none;border:1px solid var(--br);border-radius:12px;padding:12px 20px;font-size:15px;cursor:pointer;font-family:inherit;color:var(--tx);width:100%">
            <i class="ti ti-upload"></i> Datei auswählen
          </button>
          <input type="file" id="import-input-boot" accept=".json" style="display:none" onchange="importDaten(this)"/>
          <button onclick="renderDashboard()" style="background:none;border:none;color:var(--tx3);font-size:13px;cursor:pointer;font-family:inherit;margin-top:4px">Leer starten</button>
        </div>`;
    } else {
      renderDashboard();
    }
  }catch(e){
    console.error("render error:",e);
    document.getElementById("app").innerHTML=`<div style="padding:20px;color:red">Fehler: ${e.message}</div>`;
  }
})();
