<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<style>
:root {
  --bg:#f2f2f7;--bg2:#e5e5ea;--bg3:#d8d8dd;
  --tx:#0a0a0a;--tx2:#555555;--tx3:#8e8e93;
  --br:rgba(0,0,0,0.10);--br2:rgba(0,0,0,0.18);
  --r-md:10px;--r-lg:16px;
  --accent:#FF6B2B;--accent2:#ff8c55;--accent-dark:#FF6B2B;--accent-tx:#ffffff;
  --shadow-sm:0 2px 8px rgba(0,0,0,0.10);
  --shadow-md:0 4px 16px rgba(0,0,0,0.13);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.16);
  --safe-top:env(safe-area-inset-top,59px);--safe-bot:env(safe-area-inset-bottom,34px);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#111113;--bg2:#1c1c1e;--bg3:#2c2c2e;
  --tx:#f5f5f7;--tx2:#aeaeb2;--tx3:#636366;
  --br:rgba(255,255,255,0.08);--br2:rgba(255,255,255,0.16);
  --shadow-sm:0 2px 8px rgba(0,0,0,0.40);
  --shadow-md:0 4px 16px rgba(0,0,0,0.50);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.60);
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;overflow:hidden;}
.app{display:flex;flex-direction:column;height:100%;}
.screen{display:none;flex-direction:column;height:100%;}
.screen.active{display:flex;}
.topbar{display:flex;align-items:center;gap:8px;padding:calc(var(--safe-top) + 10px) 20px 14px;background:linear-gradient(160deg,#FF8240 0%,#FF6B2B 60%,#e85510 100%);flex-shrink:0;min-height:52px;box-shadow:0 4px 20px rgba(255,107,43,0.45);}
.topbar-title{font-size:19px;font-weight:700;flex:1;color:white;letter-spacing:-.3px;}
.btn-icon{background:rgba(255,255,255,0.18);border:none;cursor:pointer;color:white;font-size:28px;display:flex;align-items:center;padding:8px;border-radius:14px;min-width:46px;min-height:46px;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.20),inset 0 1px 0 rgba(255,255,255,0.30);transition:background .12s;}
.btn-icon:active{background:rgba(255,255,255,0.30);}
.btn-icon.dark{color:var(--tx2);background:var(--bg2);box-shadow:var(--shadow-sm);}
.btn-icon.dark:active{background:var(--bg3);}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px calc(var(--safe-bot) + 24px);display:flex;flex-direction:column;gap:12px;overscroll-behavior:contain;}
.sec-label{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
.sec-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.card{background:var(--bg2);border-radius:var(--r-lg);box-shadow:var(--shadow-sm);}
.card>.card-row:first-child,.card>.info-row:first-child,.card>.gfa-row:first-child,.card>.sonder-btn-row:first-child{border-radius:var(--r-lg) var(--r-lg) 0 0;}
.card>.card-row:last-child,.card>.info-row:last-child,.card>.gfa-row:last-child,.card>.sonder-btn-row:last-child{border-radius:0 0 var(--r-lg) var(--r-lg);border-bottom:none;}
.card>.card-row:only-child,.card>.info-row:only-child{border-radius:var(--r-lg);border-bottom:none;}
@media(prefers-color-scheme:dark){.card{background:var(--bg2);}}
.card-row{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--br);min-height:52px;}
.card-row:last-child{border-bottom:none;}
.card-label{font-size:15px;color:var(--tx2);display:flex;align-items:center;gap:6px;min-width:130px;flex-shrink:0;}
.card-label i{font-size:15px;}
.card-row input,.card-row select,.card-row textarea{flex:1;border:none;background:transparent;font-size:15px;color:var(--tx);font-family:inherit;outline:none;text-align:right;}
.card-row input[type=text],.card-row input[type=tel],.card-row input[type=search],.card-row textarea{text-align:left;}
.card-row textarea{text-align:left;resize:none;}
.card-row select option{background:var(--bg);}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.stat-box{background:var(--bg2);border-radius:var(--r-lg);padding:12px 14px;box-shadow:var(--shadow-sm);}
.stat-box.accent{background:linear-gradient(135deg,#FF8240,#e85510);box-shadow:0 6px 20px rgba(255,107,43,0.45);}
.stat-box.accent .stat-lbl{color:rgba(255,255,255,0.75);}
.stat-box.accent .stat-num{color:white;}
.stat-box.accent .stat-unit{color:rgba(255,255,255,0.65);}
.stat-lbl{font-size:11px;font-weight:600;color:var(--tx3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em;}
.stat-num{font-size:26px;font-weight:700;color:var(--tx);line-height:1.1;}
.stat-unit{font-size:12px;color:var(--tx2);font-weight:400;margin-left:2px;}
.list-item{background:var(--bg2);border-radius:var(--r-lg);padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;box-shadow:var(--shadow-md);transition:all .12s;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
.list-item:active{box-shadow:none;opacity:.85;}
.list-item.lp-active{transform:scale(.97);opacity:.75;transition:transform .1s,opacity .1s;}
.avatar{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0;box-shadow:var(--shadow-sm);}
.av-blue{background:#B5D4F4;color:#0C447C;}
.av-teal{background:#9FE1CB;color:#085041;}
.av-purple{background:#CECBF6;color:#3C3489;}
.av-coral{background:#F5C4B3;color:#712B13;}
.av-green{background:#C0DD97;color:#27500A;}
.av-amber{background:#FAC775;color:#633806;}
.item-name{font-size:16px;font-weight:600;}
.item-sub{font-size:13px;color:var(--tx2);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-info{flex:1;min-width:0;}
.badge{font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px;flex-shrink:0;letter-spacing:.02em;}
.badge-B{background:var(--accent-dark);color:white;}
.badge-BA{background:#e85510;color:white;}
.badge-B197{background:#c44000;color:white;}
.badge-B17{background:#27500A;color:white;}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot-blue{background:var(--accent);}
.search-wrap{position:relative;}
.search-wrap input{width:100%;height:46px;padding:0 14px 0 40px;border:1.5px solid var(--br2);border-radius:var(--r-lg);background:var(--bg2);color:var(--tx);font-size:16px;font-family:inherit;outline:none;box-shadow:var(--shadow-sm);}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--tx3);font-size:18px;pointer-events:none;}
.btn-full{width:100%;padding:15px;background:var(--bg2);border:1.5px solid var(--br2);border-radius:var(--r-lg);font-size:17px;font-weight:600;color:var(--tx);cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;min-height:54px;box-shadow:var(--shadow-sm);}
.btn-full:active{transform:scale(.97);opacity:.85;}
.btn-full.gruen{background:#d4edbc;border-color:#7ab840;color:#1e4208;}
.btn-full.rot{background:#fde8e8;border-color:#e07070;color:#8b1f1f;}
.btn-full.danger{color:#E24B4A;border-color:#E24B4A;}
.fab-btn{background:none;border:none;cursor:pointer;color:var(--tx2);font-size:22px;display:flex;align-items:center;padding:4px;}
.toast{display:none;background:linear-gradient(135deg,#FF8240,#e85510);color:white;border:none;border-radius:var(--r-md);padding:10px 14px;font-size:13px;align-items:center;gap:8px;flex-shrink:0;box-shadow:var(--shadow-md);}.toast.show{display:flex;}
.toast.show{display:flex;}
.pill{padding:8px 16px;border-radius:20px;border:1.5px solid var(--br2);background:var(--bg2);font-size:15px;color:var(--tx2);cursor:pointer;font-family:inherit;min-height:44px;display:flex;align-items:center;box-shadow:var(--shadow-sm);}
.pill.active{background:var(--accent);color:white;border-color:var(--accent);box-shadow:0 3px 10px rgba(255,107,43,0.4);}
.farb-row{display:flex;gap:8px;justify-content:flex-end;flex:1;}
.farb-dot{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
.farb-dot.sel{border-color:var(--tx);box-shadow:var(--shadow-sm);}
.toggle-wrap{position:relative;width:51px;height:31px;flex-shrink:0;}
.toggle-wrap input{opacity:0;width:0;height:0;position:absolute;}
.toggle-track{position:absolute;inset:0;border-radius:16px;background:var(--bg3);border:1px solid var(--br2);cursor:pointer;transition:background .15s;}
.toggle-track.locked{cursor:not-allowed;opacity:.4;}
.toggle-thumb{position:absolute;top:3px;left:3px;width:25px;height:25px;border-radius:50%;background:white;box-shadow:0 2px 6px rgba(0,0,0,.25);transition:transform .15s;pointer-events:none;}
.toggle-wrap input:checked+.toggle-track{background:var(--accent);border-color:var(--accent);}
.toggle-wrap input:checked+.toggle-track+.toggle-thumb{transform:translateX(20px);}
.sonder-btn-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--br);}
.sonder-btn-row:last-child{border-bottom:none;}
.sonder-btn-row.done{background:rgba(255,107,43,.08);}
.sonder-btn-row.done .sonder-btn-label{color:var(--accent);}
.sonder-btn-label{font-size:13px;color:var(--tx2);display:flex;align-items:center;gap:8px;}
.sonder-btn-label i{font-size:15px;}
.sonder-progress{display:flex;border:1px solid var(--br);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow-sm);}
.sp-step{flex:1;padding:8px 6px;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;text-align:center;border-right:1px solid var(--br);color:var(--tx3);}
.sp-step:last-child{border-right:none;}
.sp-step i{font-size:16px;}
.sp-step.done{background:linear-gradient(135deg,#FF8240,#e85510);color:white;}
.sp-step.next{background:rgba(255,107,43,.10);color:var(--accent);}
.info-row{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--br);min-height:52px;}
.info-row:last-child{border-bottom:none;}
.info-lbl{font-size:15px;color:var(--tx2);display:flex;align-items:center;gap:6px;min-width:140px;}
.info-lbl i{font-size:14px;}
.info-val{font-size:15px;font-weight:600;flex:1;text-align:right;}
.pruef-card{background:linear-gradient(135deg,#FF8240,#e85510);border:none;border-radius:var(--r-lg);padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow-md);}
.pruef-result-item{background:var(--bg2);border-radius:var(--r-lg);padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:8px;box-shadow:var(--shadow-sm);}
.pruef-versuch{width:34px;height:34px;border-radius:50%;flex-shrink:0;font-size:14px;font-weight:800;text-align:center;line-height:34px;box-shadow:var(--shadow-sm);}
.pruef-best{background:#d4edbc;color:#1e4208;}
.pruef-nicht{background:#fde8e8;color:#8b1f1f;}
.gfa-row{display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid var(--br);}
.gfa-row:last-child{border-bottom:none;}
.gfa-label{flex:1;font-size:15px;font-weight:500;color:var(--tx);}
.gfa-controls{display:flex;align-items:center;gap:12px;}
.gfa-count{font-size:18px;font-weight:700;min-width:28px;text-align:center;color:var(--tx);}
.gfa-btn{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--br2);background:var(--bg3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--tx2);font-family:inherit;line-height:1;box-shadow:var(--shadow-sm);}
.gfa-btn:active{transform:scale(.88);background:var(--accent);color:white;border-color:var(--accent);}
.stat-card{background:var(--bg2);border-radius:var(--r-lg);padding:14px 16px;box-shadow:var(--shadow-sm);}
.stat-bar-wrap{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.stat-bar-label{font-size:12px;font-weight:600;color:var(--tx2);min-width:28px;}
.stat-bar-bg{flex:1;height:8px;border-radius:4px;background:var(--bg3);overflow:hidden;}
.stat-bar-fill{height:8px;border-radius:4px;background:linear-gradient(90deg,#FF8240,#e85510);}
.stat-bar-val{font-size:12px;font-weight:600;color:var(--tx2);min-width:28px;text-align:right;}
.month-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--br);flex-shrink:0;background:var(--bg2);}
.month-label{font-size:17px;font-weight:700;}
.weekdays{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;padding:10px 12px 4px;flex-shrink:0;}
.wd{text-align:center;font-size:12px;font-weight:600;letter-spacing:.03em;}
.cal-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.cal-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;padding:4px 12px 12px;}
.cal-day{min-height:58px;border-radius:var(--r-md);padding:5px;cursor:pointer;border:.5px solid transparent;display:flex;flex-direction:column;align-items:center;gap:2px;}
.cal-day:active{background:var(--bg2);}
.cal-day.today{border-color:var(--accent);background:var(--accent);}
.cal-day.sel{background:rgba(255,107,43,.15);border-color:var(--accent);}
.cal-day.disabled{cursor:default;opacity:.25;pointer-events:none;}
.day-num{font-size:15px;font-weight:500;color:var(--tx);line-height:1;text-align:center;width:100%;}
.cal-day.today .day-num{color:white;}
.dot-row{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;}
.cdot{width:6px;height:6px;border-radius:50%;}
.cdot-r{background:#E24B4A;}.cdot-g{background:#639922;}.cdot-b{background:#378ADD;}
.spacer-day{min-height:58px;}
.termin-item{background:var(--bg);border:.5px solid var(--br);border-radius:var(--r-lg);padding:9px 12px;display:flex;align-items:center;gap:10px;}
.t-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0;}
.t-info{flex:1;}
.t-name{font-size:13px;font-weight:500;}
.t-sub{font-size:11px;color:var(--tx2);margin-top:1px;}
.t-del{background:none;border:none;cursor:pointer;color:var(--tx3);font-size:16px;padding:3px;display:flex;align-items:center;}
.t-del:active{color:#E24B4A;}
.cir-btn{width:32px;height:32px;border-radius:50%;border:.5px solid var(--br2);background:var(--bg2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--tx2);font-family:inherit;line-height:1;}
.cir-btn:active{transform:scale(.93);}
.notiz-area{width:100%;min-height:200px;border:none;background:transparent;font-size:20px;line-height:1.7;color:var(--tx);font-family:inherit;outline:none;resize:none;padding:0;}
.empty-hint{text-align:center;padding:24px 0;font-size:13px;color:var(--tx3);}
.err-border{outline:2px solid #E24B4A !important;border-radius:4px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9000;display:flex;align-items:flex-end;justify-content:center;animation:fadein .15s ease;}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.modal-sheet{background:var(--bg2);border-radius:20px 20px 0 0;padding:20px 20px calc(var(--safe-bot) + 20px);width:100%;max-width:520px;animation:slideup .2s ease;}
@keyframes slideup{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-title{font-size:17px;font-weight:700;margin-bottom:6px;color:var(--tx);}
.modal-msg{font-size:15px;color:var(--tx2);margin-bottom:20px;line-height:1.4;}
.modal-btns{display:flex;flex-direction:column;gap:8px;}
.modal-input-wrap{margin-bottom:16px;}
.modal-input-wrap textarea,.modal-input-wrap input[type=text]{width:100%;padding:12px;border:1.5px solid var(--br2);border-radius:var(--r-md);background:var(--bg);color:var(--tx);font-size:16px;font-family:inherit;outline:none;resize:none;-webkit-user-select:text;user-select:text;}
.foto-circle{width:80px;height:80px;border-radius:50%;overflow:hidden;flex-shrink:0;position:relative;cursor:pointer;}
.foto-circle img{width:100%;height:100%;object-fit:cover;display:block;}
.foto-circle .foto-overlay,.foto-initials .foto-overlay{position:absolute;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;border-radius:50%;}
.foto-circle:active .foto-overlay,.foto-initials:active .foto-overlay{opacity:1;}
.foto-overlay i{color:white;font-size:22px;}
.foto-initials{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:600;flex-shrink:0;cursor:pointer;position:relative;}
.swipe-wrap{position:relative;border-radius:var(--r-lg);margin-bottom:8px;}
.swipe-del-bg{position:absolute;right:0;top:0;bottom:0;width:80px;background:#E24B4A;display:flex;align-items:center;justify-content:center;color:white;font-size:22px;border-radius:0 var(--r-lg) var(--r-lg) 0;}
.swipe-item{position:relative;transition:transform .2s ease;touch-action:pan-y;background:var(--bg);border-radius:var(--r-lg);width:100%;z-index:1;}
.swipe-item.swiped{transform:translateX(-80px);}
.ptr-wrap{position:relative;flex:1;overflow:hidden;display:flex;flex-direction:column;}
.ptr-indicator{position:absolute;top:-72px;left:0;right:0;height:72px;display:flex;align-items:center;justify-content:center;transition:top .2s ease;z-index:10;pointer-events:none;background:rgba(255,107,43,.08);border-radius:0 0 20px 20px;}
.ptr-spinner{width:44px;height:44px;border-radius:50%;border:4px solid rgba(255,107,43,.2);border-top-color:var(--accent);box-shadow:0 2px 8px rgba(255,107,43,.3);}
@keyframes ptr-spin{to{transform:rotate(360deg);}}
.ptr-spinner.spinning{animation:ptr-spin .7s linear infinite;}

<body>
<div class="app" id="app"></div>
<div id="ipad-app" style="display:none;flex-direction:row;height:100vh;width:100%">
  <div id="ipad-sidebar" style="width:300px;flex-shrink:0;border-right:.5px solid var(--br);display:flex;flex-direction:column;height:100vh;background:var(--bg);position:relative"><div id="ipad-resize-handle"></div></div>
  <div id="ipad-detail" style="flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;background:var(--bg)"></div>
</div>
<script>
const IS_IPAD=false;

// ── ZENTRALER APP-STATE ───────────────────────────────────────────────────────
const AppState={
  fahrt:{typ:"normal",einh:1},
  efahrt:{typ:"normal",einh:1},
  kal:{typ:"normal",min:80,sonderKey:null,pers:"schueler",alleSchueler:false},
  et:{date:null,idx:null,min:80},
  pr:{versuch:1},
  pn:{versuch:1,bestanden:null},
  selFarbe:"blue",
  geschlecht:"m",
};

// ── MODAL-SYSTEM ──────────────────────────────────────────────────────────────
function showModal({title="",msg="",btns=[],input=null,onOpen=null}){
  const existing=document.getElementById("fs-modal");
  if(existing)existing.remove();
  const inputHtml=input?`<div class="modal-input-wrap">${
    input.multiline
      ?`<textarea id="fs-modal-inp" rows="3" placeholder="${input.placeholder||''}">${input.value||''}</textarea>`
      :`<input type="text" id="fs-modal-inp" placeholder="${input.placeholder||''}" value="${input.value||''}"/>`
  }</div>`:"";
  const btnsHtml=btns.map(b=>`<button onclick="${b.action}" style="width:100%;padding:15px;border-radius:var(--r-md);border:${b.danger?'1.5px solid #E24B4A':'1.5px solid var(--br2)'};background:${b.danger?'#fde8e8':b.primary?'var(--accent)':'var(--bg)'};color:${b.danger?'#8b1f1f':b.primary?'white':'var(--tx)'};font-size:17px;font-weight:600;cursor:pointer;font-family:inherit">${b.label}</button>`).join("");
  const div=document.createElement("div");
  div.id="fs-modal";
  div.className="modal-overlay";
  div.innerHTML=`<div class="modal-sheet"><div class="modal-title">${title}</div><div class="modal-msg">${msg}</div>${inputHtml}<div class="modal-btns">${btnsHtml}</div></div>`;
  div.addEventListener("click",e=>{if(e.target===div)closeModal();});
  document.body.appendChild(div);
  if(onOpen)onOpen();
  const inp=document.getElementById("fs-modal-inp");
  if(inp)setTimeout(()=>{inp.focus();inp.select&&inp.select();},80);
}
function closeModal(){const m=document.getElementById("fs-modal");if(m)m.remove();}
function modalInputVal(){const el=document.getElementById("fs-modal-inp");return el?el.value.trim():"";}

// ── TOAST-HELPER ──────────────────────────────────────────────────────────────
function showToast(id,msg){
  const el=document.getElementById(id);
  const msgEl=document.getElementById(id+"-msg");
  if(el&&msgEl){msgEl.textContent=msg;el.classList.add("show");setTimeout(()=>el.classList.remove("show"),2000);}
}
const FARBEN=[{key:"blue",bg:"rgba(255,107,43,.2)",tx:"#FF6B2B"},{key:"teal",bg:"#9FE1CB",tx:"#085041"},{key:"purple",bg:"#CECBF6",tx:"#3C3489"},{key:"coral",bg:"#F5C4B3",tx:"#712B13"},{key:"green",bg:"#C0DD97",tx:"#27500A"},{key:"amber",bg:"#FAC775",tx:"#633806"}];
const KLASSEN=["B","BA","B197","B17"];
const PRUFORTE=["DEKRA Pankow","DEKRA Ferdi","TÜV Hornbach"];
const GRUNDFAHRAUFGABEN=[
  {key:"laengs",      label:"Einparken längs",          icon:"ti-car"},
  {key:"rechts",      label:"Einparken quer",            icon:"ti-parking"},
  {key:"umkehr",      label:"Umkehren",                  icon:"ti-refresh"},
  {key:"rueckwaerts", label:"Rückwärts um die Ecke",     icon:"ti-corner-down-left"},
  {key:"stopp_mit",   label:"Stopschild mit Haltelinie", icon:"ti-octagon"},
  {key:"stopp_ohne",  label:"Stopschild ohne Haltelinie",icon:"ti-octagon-off"},
  {key:"stadtautobahn",label:"Stadtautobahn",            icon:"ti-road"},
  {key:"strassenbahn",label:"Straßenbahn",               icon:"ti-train"},
];
const SONDER=[{key:"ueberland",label:"Überlandfahrt",icon:"ti-trees",min:270},{key:"autobahn",label:"Autobahnfahrt",icon:"ti-road",min:225},{key:"nacht",label:"Nachtfahrt",icon:"ti-moon",min:135}];
const MONATE=["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];
const MONATE_K=["Jan","Feb","Mär","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];
const START_DATE=new Date(2026,3,15);

function load(k,def){try{const v=localStorage.getItem(k);return v?JSON.parse(v):def;}catch(e){return def;}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));return true;}catch(e){console.error("save error",k,e);return false;}}
// saveAll defined below with cloud sync
function showSyncStatus(msg){
  const el=document.getElementById("sync-status");
  if(!el)return;
  el.textContent=msg;el.style.opacity="1";
  setTimeout(()=>{el.style.opacity="0";},2000);
}

function saveAll(){
  const ids=new Set(schueler.map(s=>s.id));
  Object.keys(termine).forEach(d=>{
    termine[d]=termine[d].filter(t=>t.sid&&(ids.has(t.sid)||t.sid.startsWith("__auffrisch__")));
    if(!termine[d].length)delete termine[d];
  });
  save("fs_schueler",schueler);
  save("fs_termine",termine);
  showSyncStatus("✓ Gespeichert");
}


let schueler=load("fs_schueler",[]);;
let termine=load("fs_termine",{});

function toKey(y,m,d){return y+"-"+String(m).padStart(2,"0")+"-"+String(d).padStart(2,"0");}
function todayStr(){const t=new Date();return toKey(t.getFullYear(),t.getMonth()+1,t.getDate());}
function initials(s){return s.vorname[0]+s.nachname[0];}
function getS(id){return schueler.find(s=>s.id===id);}
function fmtDate(d){const p=d.split("-");return{day:parseInt(p[2]),mon:MONATE_K[parseInt(p[1])-1],year:p[0]};}
function isWeekday(y,m,d){const dw=new Date(y,m-1,d).getDay();return dw>=1&&dw<=5;}
function isBefore(y,m,d){return new Date(y,m-1,d)<START_DATE;}
function nextSonder(s){if(Array.isArray(s.sonder))return s.sonder.findIndex(x=>!x);const so=s.sonder||{};if(!so.ueberland||so.ueberland<225)return 0;if(!so.autobahn||so.autobahn<220)return 1;if(!so.nacht||so.nacht<135)return 2;return -1;}
function todayTotalMin(){const td=todayStr();return(termine[td]||[]).reduce((a,e)=>a+(e.min||0),0);}
function todayMinCheck(){}
function farbStyle(farbe){const f=FARBEN.find(x=>x.key===farbe)||FARBEN[0];return`background:${f.bg};color:${f.tx}`;}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function renderDashboard(dashDateOffset=0){
  const td=todayStr();
  const heuteTermine=(termine[td]||[]).sort((a,b)=>a.uhr.localeCompare(b.uhr));
  const allePruef=[];
  schueler.forEach(s=>{
    (s.pruefungen||[]).forEach((p,pi)=>{
      if(p.datum>=td)
        allePruef.push({sid:s.id,datum:p.datum,versuch:p.versuch,pi,bestanden:p.bestanden,typ:"offen"});
    });
  });
  allePruef.sort((a,b)=>a.datum.localeCompare(b.datum));

  let html=`<div class="screen active" id="scr-dash">
    <div class="topbar">
      <div style="display:flex;align-items:center;justify-content:space-between;width:100%;gap:2px">
        <div style="font-size:22px;color:white;flex-shrink:0"><i class="ti ti-steering-wheel" style="font-size:30px;vertical-align:-3px"></i></div>
        <button class="btn-icon" onclick="renderKalender()"><i class="ti ti-calendar"></i></button>
        <button class="btn-icon" onclick="renderListe()"><i class="ti ti-users"></i></button>
        <button class="btn-icon" onclick="renderNeuSchueler()"><i class="ti ti-user-plus"></i></button>
        <button class="btn-icon" onclick="renderAbrechnung()"><i class="ti ti-receipt"></i></button>
        <button class="btn-icon" onclick="renderStatistik()"><i class="ti ti-chart-bar"></i></button>
      </div>
    </div>
    <div class="scroll">
      <div class="stat-grid">
        <div class="stat-box accent" style="text-align:center;box-shadow:0 8px 32px rgba(255,107,43,0.45),inset 0 1px 0 rgba(255,200,150,0.5)"><div class="stat-lbl">Aktive Schüler</div><div class="stat-num" style="font-size:42px">${schueler.filter(s=>!(s.pruefungen||[]).some(p=>p.bestanden===true)).length}</div></div>
        <div class="stat-box"><div class="stat-lbl" id="ddb-lbl">Heute geplant</div><div class="stat-num" id="ddb-min">0<span class="stat-unit">min</span></div></div>
      </div>`;

  // Find display date based on offset
  let anzeigeDatum=td;
  let anzeigeLabel="Heute";
  if(dashDateOffset===0&&!heuteTermine.length){
    const alleKeys=Object.keys(termine).filter(d=>d>td).sort();
    if(alleKeys.length){
      anzeigeDatum=alleKeys[0];
      const fd2=fmtDate(anzeigeDatum);
      anzeigeLabel="Nächster Termin · "+fd2.day+". "+fd2.mon;
    }
  } else if(dashDateOffset!==0){
    // Navigate by working days
    const allKeys=Object.keys(termine).filter(d=>{const day=new Date(d).getDay();return day>=1&&day<=5;}).sort();
    const todayIdx=allKeys.findIndex(d=>d>=td);
    const targetIdx=Math.max(0,Math.min(allKeys.length-1,(todayIdx<0?allKeys.length-1:todayIdx)+dashDateOffset));
    if(allKeys[targetIdx]){
      anzeigeDatum=allKeys[targetIdx];
      const fd2=fmtDate(anzeigeDatum);
      anzeigeLabel=anzeigeDatum===td?"Heute":fd2.day+". "+fd2.mon+" "+fd2.year;
    }
  }
  const anzeigeTermine=(termine[anzeigeDatum]||[]).sort((a,b)=>a.uhr.localeCompare(b.uhr));
  const anzeigeTotalMin=anzeigeTermine.reduce((a,t)=>a+(t.min||0),0);
  const anzeigeLblShort=anzeigeDatum===td?"Heute":fmtDate(anzeigeDatum).day+". "+fmtDate(anzeigeDatum).mon;

  html+=`<div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <button onclick="renderDashboard(${dashDateOffset-1})" style="background:rgba(10,40,120,0.45);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border:1.5px solid rgba(100,150,255,0.5);border-radius:50%;color:#a8c4ff;font-size:22px;width:52px;height:52px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 15px rgba(10,40,120,0.3)"><i class="ti ti-chevron-left"></i></button>
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
        <span style="font-size:17px;font-weight:800;letter-spacing:.04em;color:var(--tx);text-transform:uppercase">${anzeigeLabel}</span>
        ${dashDateOffset!==0?`<button onclick="renderDashboard(0)" style="background:none;border:1px solid var(--accent);border-radius:8px;color:var(--accent);font-size:11px;padding:2px 10px;cursor:pointer;font-family:inherit">Heute</button>`:''}
      </div>
      <button onclick="renderDashboard(${dashDateOffset+1})" style="background:rgba(10,40,120,0.45);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border:1.5px solid rgba(100,150,255,0.5);border-radius:50%;color:#a8c4ff;font-size:22px;width:52px;height:52px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 15px rgba(10,40,120,0.3)"><i class="ti ti-chevron-right"></i></button>
    </div>`;
  if(anzeigeTermine.length){
    anzeigeTermine.forEach((t,ti)=>{
      const s=getS(t.sid);if(!s)return;
      const nick=s.spitz?` «${s.spitz}»`:"";
      const endZeit=(()=>{const [h,m]=t.uhr.split(":").map(Number);const tot=h*60+m+t.min;return String(Math.floor(tot/60)%24).padStart(2,"0")+":"+String(tot%60).padStart(2,"0");})();
      const tIdx=Object.values(termine[anzeigeDatum]||[]).indexOf(t);
      const realIdx=(termine[anzeigeDatum]||[]).findIndex((x,i)=>x===t||( x.sid===t.sid&&x.uhr===t.uhr&&x.min===t.min));
      html+=`<div class="list-item" style="margin-bottom:6px;user-select:none" 
        onclick="renderDashSchueler('${s.id}')"
        oncontextmenu="event.preventDefault();showTerminActions('${anzeigeDatum}',${realIdx},'${s.id}')"
        ontouchstart="_lpStart(event,'${anzeigeDatum}',${realIdx},'${s.id}')"
        ontouchend="_lpEnd()"
        ontouchmove="_lpEnd()">
        ${s.foto?`<div class="avatar" style="overflow:hidden;flex-shrink:0"><img src="${s.foto}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/></div>`:`<div class="avatar av-${s.farbe}">${initials(s)}</div>`}
        <div class="item-info"><div class="item-name">${s.vorname}${nick} ${s.nachname}</div><div class="item-sub">${t.uhr}–${endZeit}Uhr · ${t.min} min${t.notiz?" · "+t.notiz:""}</div></div>
        <span class="badge badge-${s.klasse}">${s.klasse}</span>
        <i class="ti ti-chevron-right" style="color:var(--tx3);font-size:16px"></i>
      </div>`;
    });
  }else{
    html+=`<div style="padding:12px 0;font-size:13px;color:var(--tx3)">Keine Termine geplant</div>`;
  }
  html+=`</div>`;
  // Nächste Prüfungen: nur anstehende ohne Ergebnis, inkl. Prüfort
  const pruefOffen=allePruef.filter(ep=>ep.bestanden===null||ep.bestanden===undefined);
  if(pruefOffen.length){
    html+=`<div><div class="sec-label">Nächste Prüfungen (${pruefOffen.length})</div>`;
    pruefOffen.forEach(ep=>{
      const s2=getS(ep.sid);if(!s2)return;
      const fd=fmtDate(ep.datum);
      const prufort=s2.prufort||"";
      const vergangen=ep.datum<td;
      const dotCol=vergangen?"#E24B4A":"var(--accent)";
      html+=`<div class="list-item" style="margin-bottom:6px;cursor:pointer" onclick="renderDashSchueler('${ep.sid}')">
        <span class="status-dot" style="background:${dotCol}"></span>
        <div class="item-info">
          <div class="item-name">${s2.vorname} ${s2.nachname}</div>
          <div class="item-sub">${ep.versuch}. Prüfung${prufort?" · "+prufort:""}${vergangen?" ⚠️":""}</div>
        </div>
        <span style="font-size:13px;color:var(--tx2);font-weight:600;white-space:nowrap">${fd.day}. ${fd.mon}</span>
      </div>`;
    });
    html+=`</div>`;
  }

  html+=`<div style="display:flex;flex-direction:column;gap:8px">
    <button class="btn-full" onclick="exportDaten()" style="background:#EAF3DE;border-color:#97C459;color:#27500A;font-size:15px"><i class="ti ti-download"></i> Daten sichern</button>
    <label style="display:block;width:100%;padding:14px;border-radius:var(--r-lg);border:1.5px solid var(--accent);background:rgba(255,107,43,.1);color:#FF6B2B;font-size:15px;font-weight:600;text-align:center;cursor:pointer;box-sizing:border-box;font-family:inherit">
      <i class="ti ti-upload"></i> Daten wiederherstellen (Datei)
      <input type="file" accept=".json" style="display:none" onchange="importDaten(this)"/>
    </label>
    <button class="btn-full" onclick="importDatenPaste()" style="background:rgba(255,107,43,.06);border-color:var(--accent);color:#FF6B2B;font-size:15px"><i class="ti ti-clipboard-text"></i> Daten einfügen (JSON)</button>
  </div></div></div>`;
  renderApp(html);
  setTimeout(()=>{
    initPTR();
    const lbl=document.getElementById("ddb-lbl");
    const min=document.getElementById("ddb-min");
    const isPast=anzeigeDatum<td;
    if(lbl){lbl.textContent=anzeigeLblShort+(isPast?" gefahren":" geplant");lbl.style.textAlign="center";}
    if(min){min.innerHTML=anzeigeTotalMin+'<span class="stat-unit">min</span>';min.style.fontSize="42px";min.style.textAlign="center";}
    const box=document.getElementById("dash-day-box");
    if(box)box.style.textAlign="center";
  },10);
}

// ── SCHÜLER LISTE HELPER ──────────────────────────────────────────────────────
function _nextTerminDT(s){
  const td=todayStr();
  const nowDT=(()=>{const n=new Date();return n.getFullYear()+"-"+String(n.getMonth()+1).padStart(2,"0")+"-"+String(n.getDate()).padStart(2,"0")+"T"+String(n.getHours()).padStart(2,"0")+":"+String(n.getMinutes()).padStart(2,"0");})();
  const all=Object.entries(termine)
    .filter(([d])=>d>=td)
    .flatMap(([d,ts])=>ts.filter(t=>t.sid===s.id).map(t=>d+"T"+(t.uhr||"00:00")))
    .filter(dt=>dt>=nowDT);
  return all.sort()[0]||"9999";
}

function _schuelerCardHTML(s,heuteIds,sortMode){
  const td=todayStr();
  const bestanden=(s.pruefungen||[]).some(p=>p.bestanden===true);
  const dotColor=bestanden?"#639922":"var(--accent)";
  const nextDT=_nextTerminDT(s);
  let subLine;
  if(sortMode==="termin"){
    if(nextDT==="9999"){subLine="Kein Termin geplant";}
    else{const nd=nextDT.split("T")[0];const t=(termine[nd]||[]).find(t=>t.sid===s.id);subLine=fmtDate(nd).day+". "+fmtDate(nd).mon+" "+fmtDate(nd).year+(t?" · "+t.uhr+" Uhr":"");}
  }else{
    subLine="Beginn "+fmtDate(s.beginn).day+". "+fmtDate(s.beginn).mon+" "+fmtDate(s.beginn).year;
  }
  const gefahren=Object.entries(termine).filter(([d])=>d<=td).flatMap(([d,ts])=>ts.filter(t=>t.sid===s.id)).length;
  const offen=Object.entries(termine).filter(([d])=>d>td).flatMap(([d,ts])=>ts.filter(t=>t.sid===s.id)).length;
  const avatarHTML=s.foto
    ?`<div class="avatar" style="overflow:hidden;flex-shrink:0"><img src="${s.foto}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/></div>`
    :`<div class="avatar av-${s.farbe}">${initials(s)}</div>`;
  return`<div class="swipe-wrap" id="wrap-${s.id}">
    <div class="swipe-del-bg" onclick="confirmDelete('${s.id}')"><i class="ti ti-trash"></i></div>
    <div class="swipe-item list-item" id="swipe-${s.id}" onclick="handleTap('${s.id}')" style="${bestanden?"border-left:3px solid #639922;":""}">
      ${avatarHTML}
      <div class="item-info">
        <div class="item-name">${s.vorname} ${s.nachname}${s.spitz?` <span style="color:var(--tx3);font-size:12px">«${s.spitz}»</span>`:""}</div>
        ${bestanden?`<div style="margin-top:3px"><span style="font-size:11px;color:#27500A;background:#EAF3DE;padding:2px 8px;border-radius:20px">✓ Bestanden</span></div>`:""}
        <div class="item-sub">${subLine}</div>
        <div style="font-size:12px;color:var(--tx3);margin-top:2px;white-space:nowrap">${gefahren} gefahren · ${offen} geplant</div>
      </div>
      <span class="badge badge-${s.klasse}">${s.klasse}</span>
      <span class="status-dot" style="background:${dotColor}"></span>
    </div>
  </div>`;
}

// ── SCHÜLERLISTE ──────────────────────────────────────────────────────────────
function renderListe(q="",sortMode="termin"){
  const td=todayStr();
  const heuteIds=new Set((termine[td]||[]).map(t=>t.sid));
  const basis=q?schueler.filter(s=>(s.vorname+" "+s.nachname+" "+(s.spitz||"")).toLowerCase().includes(q.toLowerCase())):schueler;

  const filtered=[...basis].sort((a,b)=>{
    if(sortMode==="alpha") return a.nachname.localeCompare(b.nachname,"de");
    return _nextTerminDT(a).localeCompare(_nextTerminDT(b));
  });
  let html=`<div class="screen active" id="scr-liste">
    <div class="topbar">
      <button class="btn-icon" onclick="renderDashboard()"><i class="ti ti-arrow-left"></i></button>
      <span class="topbar-title">Schüler</span>
      <button class="btn-icon" onclick="renderListe('','${sortMode==='termin'?'alpha':'termin'}')" aria-label="Sortierung" title="${sortMode==='termin'?'Alphabetisch':'Nächster Termin'}"><i class="ti ti-sort-ascending"></i></button>
      <button class="btn-icon" onclick="renderNeuSchueler()"><i class="ti ti-user-plus"></i></button>
    </div>
    <div class="scroll">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
        <span style="font-size:12px;color:var(--tx3)">${sortMode==="alpha"?"↑ A–Z":"↑ Nächster Termin"}</span>
        <button onclick="renderListe('${q}','${sortMode==='termin'?'alpha':'termin'}')" style="font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;font-family:inherit;padding:0">Ändern</button>
      </div>
      <div class="search-wrap">
        <i class="ti ti-search search-icon"></i>
        <input type="search" placeholder="Suchen…" value="${q}" oninput="filterListeOnly(this.value,'${sortMode}')" id="search-input" style="padding-right:${q?'40px':'12px'}"/>
        <button class="search-clear-x" onclick="renderListe('','${sortMode}')" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--tx3);font-size:18px;display:${q?'flex':'none'};align-items:center;padding:4px"><i class="ti ti-x"></i></button>
      </div>`;
  html+=`<div id="liste-items">`;
  if(!filtered.length){
    html+=`<div class="empty-hint"><i class="ti ti-search" style="font-size:28px;display:block;margin:0 auto 8px"></i>Keine Schüler gefunden</div>`;
  }else{
    filtered.forEach(s=>{html+=_schuelerCardHTML(s,heuteIds,sortMode);});
  }
  html+=`</div></div></div>`;
  renderApp(html);
  initSwipe();
  setTimeout(initPTR,50);
}


function filterListeOnly(q, sortMode){
  const container=document.getElementById("liste-items");
  if(!container){renderListe(q,sortMode);return;}

  const clearBtns=document.querySelectorAll(".search-clear-x");
  clearBtns.forEach(b=>b.style.display=q?"flex":"none");

  const td=todayStr();
  const heuteIds=new Set((termine[td]||[]).map(t=>t.sid));
  const basis=q?schueler.filter(s=>(s.vorname+" "+s.nachname+" "+(s.spitz||"")).toLowerCase().includes(q.toLowerCase())):schueler;

  const filtered=[...basis].sort((a,b)=>{
    if(sortMode==="termin") return _nextTerminDT(a).localeCompare(_nextTerminDT(b));
    return (heuteIds.has(a.id)?0:1)-(heuteIds.has(b.id)?0:1);
  });

  let html="";
  if(!filtered.length){
    html=`<div class="empty-hint"><i class="ti ti-search" style="font-size:28px;display:block;margin:0 auto 8px"></i>Keine Schüler gefunden</div>`;
  }else{
    filtered.forEach(s=>{html+=_schuelerCardHTML(s,heuteIds,sortMode);});
  }
  container.innerHTML=html;
  initSwipe();
}

function initSwipe(){
  document.querySelectorAll(".swipe-item").forEach(el=>{
    const sid=el.id.replace("swipe-","");
    let startX,startY,dragging=false;
    el.addEventListener("touchstart",e=>{startX=e.touches[0].clientX;startY=e.touches[0].clientY;dragging=false;},{passive:true});
    el.addEventListener("touchmove",e=>{
      const dx=e.touches[0].clientX-startX,dy=e.touches[0].clientY-startY;
      if(!dragging&&Math.abs(dy)>Math.abs(dx)+5)return;
      dragging=true;
      const base=el.classList.contains("swiped")?-80:0;
      el.style.transition="none";
      el.style.transform=`translateX(${Math.max(Math.min(base+dx,0),-80)}px)`;
    },{passive:true});
    el.addEventListener("touchend",e=>{
      if(!dragging)return;
      const dx=e.changedTouches[0].clientX-startX;
      el.style.transition="transform .2s ease";
      if(el.classList.contains("swiped")){if(dx>30){el.style.transform="translateX(0)";el.classList.remove("swiped");}else el.style.transform="translateX(-80px)";}
      else{if(dx<-30){el.style.transform="translateX(-80px)";el.classList.add("swiped");}else el.style.transform="translateX(0)";}
      setTimeout(()=>{el.style.transition="";dragging=false;},220);
    });
  });
}
function handleTap(sid){
  const el=document.getElementById("swipe-"+sid);
  if(el&&el.classList.contains("swiped")){el.style.transition="transform .2s ease";el.style.transform="translateX(0)";el.classList.remove("swiped");return;}
  renderDashSchueler(sid);
}
function confirmDelete(sid){
  const s=getS(sid);if(!s)return;
  showModal({
    title:"Schüler löschen",
    msg:`${s.vorname} ${s.nachname} wirklich löschen? Alle Termine dieses Schülers werden ebenfalls entfernt.`,
    btns:[
      {label:"Löschen",danger:true,action:`_doDeleteSchueler('${sid}')`},
      {label:"Abbrechen",action:"closeModal()"},
    ]
  });
}
function _doDeleteSchueler(sid){
  closeModal();
  schueler=schueler.filter(x=>x.id!==sid);
  saveAll();renderListe();
}

function saveNotiz(sid,val){const s=getS(sid);if(!s)return;s.notiz=val;saveAll();}

function addNotizItem(sid){
  const s=getS(sid);if(!s)return;
  showModal({
    title:"Neue Notiz",
    msg:"",
    input:{placeholder:"Notiz eingeben…",multiline:false,value:""},
    btns:[
      {label:"Hinzufügen",primary:true,action:`_doAddNotiz('${sid}')`},
      {label:"Abbrechen",action:"closeModal()"},
    ]
  });
}
function _doAddNotiz(sid){
  const text=modalInputVal();if(!text)return;
  closeModal();
  const s=getS(sid);if(!s)return;
  if(!Array.isArray(s.notiz))s.notiz=s.notiz?[{text:s.notiz,done:false}]:[];
  s.notiz.push({text,done:false});
  saveAll();renderSchueler(sid);
}

function toggleNotiz(sid,idx,done){
  const s=getS(sid);if(!s)return;
  if(!Array.isArray(s.notiz))return;
  s.notiz[idx].done=done;
  saveAll();
  // update visual without full re-render
  const span=event.target.closest(".notiz-item").querySelector("span");
  if(span){span.style.textDecoration=done?"line-through":"";span.style.color=done?"var(--tx3)":"var(--tx)";}
}

function editNotizItem(sid,idx){
  const s=getS(sid);if(!s)return;
  if(!Array.isArray(s.notiz))return;
  showModal({
    title:"Notiz bearbeiten",
    msg:"",
    input:{placeholder:"Notiz…",multiline:false,value:s.notiz[idx].text},
    btns:[
      {label:"Speichern",primary:true,action:`_doEditNotiz('${sid}',${idx})`},
      {label:"Abbrechen",action:"closeModal()"},
    ]
  });
}
function _doEditNotiz(sid,idx){
  const text=modalInputVal();
  closeModal();
  const s=getS(sid);if(!s)return;
  if(text)s.notiz[idx].text=text;
  saveAll();renderSchueler(sid);
}

function deleteNotizItem(sid,idx){
  const s=getS(sid);if(!s)return;
  if(!Array.isArray(s.notiz))return;
  s.notiz.splice(idx,1);
  saveAll();renderSchueler(sid);
}
function changeGFA(sid,key,d){const s=getS(sid);if(!s)return;if(!s.gfa)s.gfa={};s.gfa[key]=Math.max(0,(s.gfa[key]||0)+d);saveAll();const el=document.getElementById("gfa-"+sid+"-"+key);if(el)el.textContent=s.gfa[key];}

  showModal({
    title:"Klasse ändern",
    msg:`Klasse von ${s.klasse} auf ${next} ändern?`,
    btns:[
      {label:"Ändern",primary:true,action:`_doChangeKlasse('${sid}','${next}')`},
      {label:"Abbrechen",action:"closeModal()"},
    ]
  });
}
function _doChangeKlasse(sid,next){
  closeModal();
  const s=getS(sid);if(!s)return;
  s.klasse=next;saveAll();
  const el=document.getElementById("klasse-box-"+sid);
  if(el)el.textContent=next;
}

function setGeschlecht(g){

  if(gm)gm.classList.toggle("active",g==="m");
  if(gw)gw.classList.toggle("active",g==="w");

function showFotoEditor(sid){
  const s=getS(sid);if(!s||!s.foto)return;
  const existing=document.getElementById("fs-modal");if(existing)existing.remove();
  const div=document.createElement("div");
  div.id="fs-modal";div.className="modal-overlay";div.style.alignItems="center";
  div.innerHTML=`<div class="modal-sheet" style="border-radius:20px;max-width:360px;margin:16px">
    <div class="modal-title" style="margin-bottom:12px">Ausschnitt anpassen</div>
    <div style="position:relative;width:240px;height:240px;border-radius:50%;overflow:hidden;margin:0 auto 16px;border:3px solid var(--accent);background:#000">
      <img id="foto-edit-img" src="${s.foto}" style="position:absolute;transform-origin:center center;cursor:grab;user-select:none;-webkit-user-select:none;touch-action:none"/>
    </div>
    <div style="margin-bottom:8px">
      <div style="font-size:12px;color:var(--tx3);margin-bottom:6px;text-align:center">Zoom</div>
      <input type="range" id="foto-zoom" min="50" max="200" value="100" style="width:100%;accent-color:var(--accent)"/>
    </div>
    <div class="modal-btns" style="margin-top:16px">
      <button onclick="applyFotoEdit('${sid}')" style="width:100%;padding:15px;border-radius:var(--r-md);border:none;background:var(--accent);color:white;font-size:17px;font-weight:600;cursor:pointer;font-family:inherit">Speichern</button>
      <button onclick="closeModal()" style="width:100%;padding:15px;border-radius:var(--r-md);border:1.5px solid var(--br2);background:var(--bg);color:var(--tx);font-size:17px;font-weight:600;cursor:pointer;font-family:inherit">Abbrechen</button>
    </div>
  </div>`;
  div.addEventListener("click",e=>{if(e.target===div)closeModal();});
  document.body.appendChild(div);
  setTimeout(()=>{
    const img=document.getElementById("foto-edit-img");
    const zoom=document.getElementById("foto-zoom");
    if(!img||!zoom)return;
    let ox=0,oy=0,startX=0,startY=0,dragging=false;
    function applyTransform(){img.style.transform=`translate(${ox}px,${oy}px) scale(${zoom.value/100})`;}
    img.onload=function(){
      const iw=img.naturalWidth,ih=img.naturalHeight;
      const fit=Math.max(240/iw,240/ih);
      zoom.value=Math.round(fit*100);
      img.style.width=iw+"px";img.style.height=ih+"px";
      img.style.left=((240-iw)/2)+"px";img.style.top=((240-ih)/2)+"px";
      applyTransform();
    };
    if(img.complete&&img.naturalWidth)img.onload();
    zoom.addEventListener("input",applyTransform);
    img.addEventListener("touchstart",e=>{e.preventDefault();dragging=true;startX=e.touches[0].clientX-ox;startY=e.touches[0].clientY-oy;},{passive:false});
    img.addEventListener("touchmove",e=>{e.preventDefault();if(!dragging)return;ox=e.touches[0].clientX-startX;oy=e.touches[0].clientY-startY;applyTransform();},{passive:false});
    img.addEventListener("touchend",()=>{dragging=false;});
    img.addEventListener("mousedown",e=>{dragging=true;startX=e.clientX-ox;startY=e.clientY-oy;img.style.cursor="grabbing";});
    document.addEventListener("mousemove",e=>{if(!dragging)return;ox=e.clientX-startX;oy=e.clientY-startY;applyTransform();});
    document.addEventListener("mouseup",()=>{dragging=false;img.style.cursor="grab";});
  },100);
}
function applyFotoEdit(sid){
  const img=document.getElementById("foto-edit-img");
  const zoom=document.getElementById("foto-zoom");
  if(!img)return;
  const sc=zoom?zoom.value/100:1;
  const match=(img.style.transform||"").match(/translate\(([^,]+)px,([^p]+)px\)/);
  const ox=match?parseFloat(match[1]):0;
  const oy=match?parseFloat(match[2]):0;
  const iw=img.naturalWidth,ih=img.naturalHeight;
  const imgLeft=(240-iw)/2,imgTop=(240-ih)/2;
  const screenX=imgLeft+ox,screenY=imgTop+oy;
  const SIZE=300;
  const canvas=document.createElement("canvas");
  canvas.width=SIZE;canvas.height=SIZE;
  canvas.getContext("2d").drawImage(img,-screenX/sc,-screenY/sc,240/sc,240/sc,0,0,SIZE,SIZE);
  const s=getS(sid);if(s){s.foto=canvas.toDataURL("image/jpeg",.85);saveAll();closeModal();renderSchueler(sid);showToast("toast-main","Foto gespeichert");}
}
function saveFoto(sid,input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    const img=new Image();
    img.onload=function(){
      const canvas=document.createElement("canvas");
      const minSide=Math.min(img.width,img.height);
      const sx=(img.width-minSide)/2,sy=(img.height-minSide)/2;
      const outSize=Math.min(minSide,400);
      canvas.width=outSize;canvas.height=outSize;
      canvas.getContext("2d").drawImage(img,sx,sy,minSide,minSide,0,0,outSize,outSize);
      const s=getS(sid);if(s){s.foto=canvas.toDataURL("image/jpeg",.85);saveAll();renderSchueler(sid);showToast("toast-main","Foto gespeichert");}
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

let curYear=2026,curMonth=5,selDate=null;

function renderCalGrid(){
  const grid=document.getElementById("cal-grid");if(!grid)return;
  grid.innerHTML="";
  const td=todayStr();
  const dim=new Date(curYear,curMonth,0).getDate();
  // collect only weekdays
  const weekdays=[];
  for(let d=1;d<=dim;d++)if(isWeekday(curYear,curMonth,d))weekdays.push(d);
  if(!weekdays.length)return;
  // offset: what weekday (Mon=0) is the first weekday of the month
  const firstDow=(new Date(curYear,curMonth-1,weekdays[0]).getDay()+6)%7;
  for(let i=0;i<firstDow;i++){const sp=document.createElement("div");sp.className="spacer-day";grid.appendChild(sp);}
  for(let d=1;d<=dim;d++){
    if(!isWeekday(curYear,curMonth,d))continue;
    const isWE=false;
    const key=toKey(curYear,curMonth,d);
    const el=document.createElement("div");el.className="cal-day";
    if(isBefore(curYear,curMonth,d))el.classList.add("disabled");
    if(key===td)el.classList.add("today");
    if(key===selDate)el.classList.add("sel");
    const dn=document.createElement("div");dn.className="day-num";dn.textContent=d;el.appendChild(dn);
    const t=termine[key];
    if(t&&t.length){
      const dr=document.createElement("div");dr.className="dot-row";
      t.slice(0,6).forEach(e=>{
        let cls="cdot-g";
        if(e.typ==="pruef")cls="cdot-r";
        else if(e.typ==="ueberland"||e.typ==="autobahn"||e.typ==="nacht"||e.min===225||e.min===220||e.min===135)cls="cdot-b";
        const dot=document.createElement("div");
        dot.className="cdot "+cls;
        dr.appendChild(dot);
      });
      el.appendChild(dr);
    }
    el.setAttribute("onclick",`selDate='${key}';renderTagAnsicht('${key}')`);
    grid.appendChild(el);
  }

function changeKalMin(d){AppState.kal.min=Math.max(5,Math.min(300,AppState.kal.min+d));const el=document.getElementById("kal-min-disp");if(el)el.textContent=AppState.kal.min+" min";}

function setKTyp(typ){
  AppState.kal.typ=typ;
  ["normal","pruef","ueberland","autobahn","nacht","auffrisch"].forEach(t=>{const el=document.getElementById("ktyp-"+t);if(el)el.classList.toggle("active",t===typ);});
  if(typ==="normal")AppState.kal.min=80;
  else if(typ==="pruef")AppState.kal.min=100;
  else if(typ==="ueberland")AppState.kal.min=225;
  else if(typ==="autobahn")AppState.kal.min=220;
  else if(typ==="nacht")AppState.kal.min=135;
  else if(typ==="auffrisch")AppState.kal.min=80;
  const el=document.getElementById("kal-min-disp");if(el)el.textContent=AppState.kal.min+" min";
  const pf=document.getElementById("kal-prufort-row");
  if(pf)pf.style.display=typ==="pruef"?"":"none";
  kalUpdateEnd();
}

function setKSonder(key,min){
  SONDER.forEach(sf=>{const el=document.getElementById("ksf-"+sf.key);if(el)el.classList.toggle("active",sf.key===key);});
  AppState.kal.min=min;AppState.kal.sonderKey=key;
  const el=document.getElementById("kal-min-disp");if(el)el.textContent=min+" min";
  kalUpdateEnd();
}

function kalUpdateEnd(){
  const uhr=document.getElementById("k-uhr");
  const endEl=document.getElementById("k-endzeit");
  if(!uhr||!endEl)return;
  const [h,m]=uhr.value.split(":").map(Number);
  const total=h*60+m+(AppState.kal.min||80);
  const eh=Math.floor(total/60)%24;
  const em=total%60;
  endEl.textContent=String(eh).padStart(2,"0")+":"+String(em).padStart(2,"0")+" Uhr";
}
function toggleKalAlleSchueler(){
  AppState.kal.alleSchueler=!AppState.kal.alleSchueler;
  const sel=document.getElementById("k-sid");
  const btn=document.getElementById("k-alle-btn");
  if(!sel)return;
  const list=AppState.kal.alleSchueler?[...schueler]:schueler.filter(s=>!(s.pruefungen||[]).some(p=>p.bestanden===true));
  sel.innerHTML='<option value="">Auswählen…</option>'+list.map(s=>'<option value="'+s.id+'">'+s.vorname+' '+s.nachname+(s.spitz?' «'+s.spitz+'»':'')+'</option>').join('');
  if(btn)btn.textContent=AppState.kal.alleSchueler?'− Nur aktive Schüler anzeigen':'+ Auch bestandene Schüler anzeigen';
}

function setKPers(typ){
  AppState.kal.pers=typ;
  document.getElementById("kpers-schueler").classList.toggle("active",typ==="schueler");
  document.getElementById("kpers-auffrisch").classList.toggle("active",typ==="auffrisch");
  document.getElementById("k-schueler-row").style.display=typ==="schueler"?"":"none";
  document.getElementById("k-auffrisch-row").style.display=typ==="auffrisch"?"":"none";
}

function saveKalTermin(date){
  try{
  const uhr=document.getElementById("k-uhr")?document.getElementById("k-uhr").value:"";
  if(!uhr)return;
  const isAuffrisch=(AppState.kal.pers||"schueler")==="auffrisch";
  let sid;
  if(!isAuffrisch){
    sid=document.getElementById("k-sid")?document.getElementById("k-sid").value:"";
    if(!sid){
      const el=document.getElementById("k-sid");
      if(el){el.classList.add("err-border");setTimeout(()=>el.classList.remove("err-border"),1500);}
      return;
    }
  } else {
    const nameEl=document.getElementById("k-auffrisch-name");
    const name=nameEl?nameEl.value.trim():"";
    if(!name){
      if(nameEl){nameEl.classList.add("err-border");setTimeout(()=>nameEl.classList.remove("err-border"),1500);}
      return;
    }
    sid="__auffrisch__:"+name;
  }
  const min=AppState.kal.min||80;
  if(!termine[date])termine[date]=[];
  const knotiz=document.getElementById('k-notiz');const notizVal=knotiz?knotiz.value.trim():'';
  const ksf2=AppState.kal.sonderKey;const ktyp2=AppState.kal.typ||'normal';
  const autoN=ktyp2==='pruef'?'Prüfung':ktyp2==='auffrisch'?'Auffrischung':ktyp2==='ueberland'?'Überlandfahrt':ktyp2==='autobahn'?'Autobahnfahrt':ktyp2==='nacht'?'Nachtfahrt':'';
  // Store typ in termin for reliable sync
  const kalTypStr=ktyp2;
  termine[date].push({sid,uhr,min,notiz:notizVal||autoN,typ:kalTypStr||ktyp2||''});
  termine[date].sort((a,b)=>a.uhr.localeCompare(b.uhr));
  // If Prüfung: add to student's Prüfungen list
  if((AppState.kal.typ||"normal")==="pruef"&&!sid.startsWith("__auffrisch__")){
    const ps=getS(sid);
    if(ps){
      if(!ps.pruefungen)ps.pruefungen=[];
      const prufort=document.getElementById("k-prufort")?document.getElementById("k-prufort").value:ps.prufort;
      const versuch=(ps.pruefungen.length+1);
      // Always update/add pruefung for this date+uhr
      const existIdx=ps.pruefungen.findIndex(p=>p.datum===date&&p.uhr===uhr);
      if(existIdx>=0){
        ps.pruefungen[existIdx].prufort=prufort;
      } else {
        ps.pruefungen.push({datum:date,uhr,versuch:0,bestanden:null,prufort});
        ps.pruefungen.sort((a,b)=>a.datum.localeCompare(b.datum));
        // Assign versuch numbers in chronological order
        ps.pruefungen.forEach((p,i)=>{if(p.versuch===0)p.versuch=i+1;});
      }
    }
  }
  saveAll();
  selDate=date;
  renderTagAnsicht(date);
  }catch(e){document.getElementById("app").innerHTML=`<div style="padding:20px;color:red">Fehler: ${e.message}</div>`;}
}

// ── STATISTIK ─────────────────────────────────────────────────────────────────
function renderStatistik(){
  syncKalenderToFahrstunden();
  const alle=schueler.flatMap(s=>(s.pruefungen||[]).filter(p=>p.bestanden!==null&&p.bestanden!==undefined).map(p=>({...p,sid:s.id,name:s.vorname+" "+s.nachname,klasse:s.klasse,prufort:s.prufort})));
  const alleInklOffen=schueler.flatMap(s=>(s.pruefungen||[]).map(p=>({...p,sid:s.id,name:s.vorname+" "+s.nachname,klasse:s.klasse,prufort:s.prufort})));
  const gesamt=alle.length;
  const bestanden=alle.filter(p=>p.bestanden).length;
  const quote=gesamt?Math.round((bestanden/gesamt)*100):0;
  const v=[1,2,3,4].map(n=>({n,list:alle.filter(p=>p.versuch===n)}));
  const ortStats=PRUFORTE.map(o=>{
    const ps=schueler.filter(s=>s.prufort===o).flatMap(s=>(s.pruefungen||[]).filter(p=>p.bestanden!==null&&p.bestanden!==undefined));
    const tot=ps.length,best=ps.filter(p=>p.bestanden).length;
    return{ort:o,tot,best,quote:tot?Math.round((best/tot)*100):null};
  }).filter(o=>o.tot>0);
  const td2=todayStr();
  // Upcoming (future, open) first sorted by date asc, then past results sorted by date desc
  const recent=[...alleInklOffen].sort((a,b)=>{
    const aUpcoming=a.datum>=td2&&(a.bestanden===null||a.bestanden===undefined);
    const bUpcoming=b.datum>=td2&&(b.bestanden===null||b.bestanden===undefined);
    if(aUpcoming&&!bUpcoming)return -1;
    if(!aUpcoming&&bUpcoming)return 1;
    if(aUpcoming&&bUpcoming)return a.datum.localeCompare(b.datum); // upcoming: earliest first
    return b.datum.localeCompare(a.datum); // past: most recent first
  }).slice(0,15);

  let html=`<div class="screen active" id="scr-stat">
    <div class="topbar">
      <button class="btn-icon" onclick="renderDashboard()"><i class="ti ti-arrow-left"></i></button>
      <span class="topbar-title">Statistik</span>
    </div>
    <div class="scroll">
      <div class="stat-grid">
        <div class="stat-box accent" style="text-align:center"><div class="stat-lbl">Bestehensquote</div><div class="stat-num" style="font-size:48px">${quote}<span class="stat-unit">%</span></div></div>
        <div class="stat-box" style="text-align:center"><div class="stat-lbl">Prüfungen gesamt</div><div class="stat-num" style="font-size:48px">${gesamt}</div></div>
      </div>
      <div class="stat-grid">
        <div class="stat-box" style="text-align:center"><div class="stat-lbl">Bestanden</div><div class="stat-num" style="font-size:48px;color:#27500A">${bestanden}</div></div>
        <div class="stat-box" style="text-align:center"><div class="stat-lbl">Nicht bestanden</div><div class="stat-num" style="font-size:48px;color:#A32D2D">${gesamt-bestanden}</div></div>
      </div>`;

  if(gesamt===0){
    html+=`<div class="empty-hint"><i class="ti ti-chart-bar" style="font-size:32px;display:block;margin:0 auto 10px"></i>Noch keine Prüfungsdaten.<br>Ergebnisse über das Dashboard eintragen.</div>`;
  }else{
    html+=`<div><div class="sec-label">Nach Prüfungsversuch</div><div class="stat-card">`;
    v.filter(x=>x.list.length>0).forEach(x=>{
      const best=x.list.filter(p=>p.bestanden).length;
      const pct=x.list.length?Math.round((best/x.list.length)*100):0;
      html+=`<div class="stat-bar-wrap" style="margin-bottom:14px;padding:4px 0"><span class="stat-bar-label" style="font-size:15px">${x.n}.</span><div class="stat-bar-bg" style="height:12px;border-radius:6px"><div class="stat-bar-fill" style="height:12px;border-radius:6px;width:${pct}%"></div></div><span class="stat-bar-val" style="font-size:14px">${pct}%</span><span style="font-size:12px;color:var(--tx3);min-width:36px">${best}/${x.list.length}</span></div>`;
    });
    html+=`</div></div>`;
    if(ortStats.length){
      html+=`<div><div class="sec-label">Nach Prüfort</div><div class="stat-card">`;
      ortStats.forEach(o=>{
        html+=`<div class="stat-bar-wrap" style="margin-bottom:14px;padding:4px 0"><span class="stat-bar-label" style="min-width:90px;font-size:13px">${o.ort.replace("DEKRA ","").replace("TÜV ","")}</span><div class="stat-bar-bg" style="height:12px;border-radius:6px"><div class="stat-bar-fill" style="height:12px;border-radius:6px;width:${o.quote}%"></div></div><span class="stat-bar-val" style="font-size:14px">${o.quote}%</span><span style="font-size:12px;color:var(--tx3);min-width:36px">${o.best}/${o.tot}</span></div>`;
      });
      html+=`</div></div>`;
    }
    if(recent.length){
      const upcomingCount=recent.filter(p=>p.datum>=td2&&(p.bestanden===null||p.bestanden===undefined)).length;
      html+=`<div><div class="sec-label">Prüfungen (${upcomingCount} ausstehend)</div>`;
      recent.forEach(p=>{
        const fd=fmtDate(p.datum);
        const pOffen=p.bestanden===null||p.bestanden===undefined;
        const isUpcoming=p.datum>=td2&&pOffen;
        html+=`<div class="pruef-result-item" onclick="renderDashSchueler('${p.sid}')" style="cursor:pointer;padding:14px 16px;gap:14px;${isUpcoming?"border-left:3px solid var(--accent);":""}">
          <div style="width:40px;height:40px;border-radius:50%;flex-shrink:0;text-align:center;line-height:40px;font-size:15px;font-weight:700;${pOffen?"background:rgba(255,107,43,0.15);color:var(--accent);":p.bestanden?"background:#EAF3DE;color:#27500A;":"background:#FCEBEB;color:#A32D2D;"}">${p.versuch}</div>
          <div style="flex:1"><div style="font-size:15px;font-weight:600;color:var(--tx)">${p.name}</div>
          <div style="font-size:12px;color:var(--tx2);margin-top:3px">${p.versuch}. Prüfung · ${fd.day}. ${fd.mon} ${fd.year}${p.prufort?" · "+p.prufort:""}</div></div>
          <span style="font-size:18px;color:${pOffen?"var(--accent)":p.bestanden?"#27500A":"#A32D2D"}">${pOffen?"⏳":p.bestanden?"✓":"✗"}</span>
        </div>`;
      });
      html+=`</div>`;
    }
  }
  html+=`</div></div>`;
  renderApp(html);
  setTimeout(initPTR,50);
}

function changeETMin(d){

function saveEditDashTermin(){
  const date=AppState.et.date;const idx=AppState.et.idx;
  if(!termine[date]||!termine[date][idx])return;
  termine[date][idx].sid=document.getElementById("et-sid").value;
  termine[date][idx].uhr=document.getElementById("et-uhr").value;
  termine[date][idx].min=AppState.et.min||80;
  termine[date][idx].notiz=document.getElementById("et-notiz").value.trim();
  termine[date].sort((a,b)=>a.uhr.localeCompare(b.uhr));
  saveAll();if(AppState.et.backSid)renderDashSchueler(AppState.et.backSid);else renderDashboard();
}

function deleteEditDashTermin(){
  const date=AppState.et.date;const idx=AppState.et.idx;
  if(!termine[date])return;
  const t=termine[date][idx];const s=getS(t.sid);
  const name=s?s.vorname+" "+s.nachname:"Termin";
  showModal({
    title:"Termin löschen",
    msg:`${name} · ${t.uhr} Uhr wirklich löschen?`,
    btns:[
      {label:"Löschen",danger:true,action:"_doDeleteEditDashTermin()"},
      {label:"Abbrechen",action:"closeModal()"},
    ]
  });
}
function _doDeleteEditDashTermin(){
  closeModal();
  const date=AppState.et.date;const idx=AppState.et.idx;
  if(!termine[date])return;
  termine[date].splice(idx,1);
  if(!termine[date].length)delete termine[date];
  saveAll();renderDashboard();
}

function renderTagAnsicht(date){
  const p=date.split("-");
  const fd=fmtDate(date);
  const wochentage=["So","Mo","Di","Mi","Do","Fr","Sa"];
  const dow=wochentage[new Date(date).getDay()];
  const t=termine[date]||[];
  const td=todayStr();

  let html=`<div class="screen active" id="scr-tag">
    <div class="topbar">

function ektUpdateEnd(){
  const uhr=document.getElementById("ekt-uhr");
  const endEl=document.getElementById("ekt-endzeit");
  if(!uhr||!endEl)return;
  const [h,m]=uhr.value.split(":").map(Number);
  const total=h*60+m+(AppState.et.min||80);
  const eh=Math.floor(total/60)%24;
  const em=total%60;
  endEl.textContent=String(eh).padStart(2,"0")+":"+String(em).padStart(2,"0")+" Uhr";
}

function setEKTyp(typ){
  ["normal","pruef","ueberland","autobahn","nacht","auffrisch"].forEach(t=>{const el=document.getElementById("ektyp-"+t);if(el)el.classList.toggle("active",t===typ);});
  if(typ==="normal"||typ==="auffrisch")AppState.et.min=80;
  else if(typ==="pruef")AppState.et.min=100;
  else if(typ==="ueberland")AppState.et.min=225;
  else if(typ==="autobahn")AppState.et.min=220;
  else if(typ==="nacht")AppState.et.min=135;
  const el=document.getElementById("et-min-disp");if(el)el.textContent=AppState.et.min+" min";
  ektUpdateEnd();
}

function setEKSonder(key,min){
  SONDER.forEach(sf=>{const el=document.getElementById("eksf-"+sf.key);if(el)el.classList.toggle("active",sf.key===key);});
  AppState.et.min=min;
  const el=document.getElementById("et-min-disp");if(el)el.textContent=min+" min";
  ektUpdateEnd();
}

function saveEktTermin(date,idx){
  if(!termine[date]||!termine[date][idx])return;
  const isAuffrisch3=AppState.et.isAuffrisch||false;
  const ekTag=document.getElementById('ekt-dat-tag').value;
  const ekMon=document.getElementById('ekt-dat-mon').value;
  const ekJahr=document.getElementById('ekt-dat-jahr').value;
  const newDate=(ekTag&&ekMon&&ekJahr)?ekJahr+'-'+String(ekMon).padStart(2,'0')+'-'+String(ekTag).padStart(2,'0'):date;
  const entry=termine[date][idx];
  if(!isAuffrisch3){const ektSid=document.getElementById('ekt-sid');if(ektSid)entry.sid=ektSid.value;}
  entry.uhr=document.getElementById("ekt-uhr").value;
  entry.min=AppState.et.min||80;
  entry.notiz=document.getElementById("ekt-notiz").value.trim();
  // Move to new date if changed
  if(newDate!==date){
    termine[date].splice(idx,1);
    if(!termine[date].length)delete termine[date];
    if(!termine[newDate])termine[newDate]=[];
    termine[newDate].push(entry);
    termine[newDate].sort((a,b)=>a.uhr.localeCompare(b.uhr));
  } else {
    termine[date].sort((a,b)=>a.uhr.localeCompare(b.uhr));
  }
  // If Prüfung type: sync to student's pruefungen
  if(entry.typ==="pruef"&&!entry.sid.startsWith("__auffrisch__")){
    const ps=getS(entry.sid);
    if(ps){
      if(!ps.pruefungen)ps.pruefungen=[];
      const versuch=(ps.pruefungen.length+1);
      const existIdx=ps.pruefungen.findIndex(p=>p.datum===newDate);
      if(existIdx>=0){
        ps.pruefungen[existIdx].uhr=entry.uhr;
      } else {
        ps.pruefungen.push({datum:newDate,uhr:entry.uhr,versuch:0,bestanden:null,prufort:ps.prufort||""});
        ps.pruefungen.sort((a,b)=>a.datum.localeCompare(b.datum));
        ps.pruefungen.forEach((p,i)=>{if(p.versuch===0)p.versuch=i+1;});
      }
    }
  }
  saveAll();
  selDate=newDate;
  setTimeout(()=>renderTagAnsicht(newDate),100);
}

function initPTR(){
  const scrollEl=document.querySelector(".scroll");if(!scrollEl)return;
  const parent=scrollEl.parentElement;
  let ptrWrap=parent.querySelector(".ptr-wrap");
  if(!ptrWrap){ptrWrap=document.createElement("div");ptrWrap.className="ptr-wrap";parent.insertBefore(ptrWrap,scrollEl);ptrWrap.appendChild(scrollEl);}
  let indicator=ptrWrap.querySelector(".ptr-indicator");
  if(!indicator){indicator=document.createElement("div");indicator.className="ptr-indicator";indicator.innerHTML='<div class="ptr-spinner" id="ptr-spinner"></div>';ptrWrap.insertBefore(indicator,scrollEl);}
  let startY=0,pulling=false,triggered=false;
  const THRESHOLD=72;
  scrollEl.addEventListener("touchstart",e=>{if(scrollEl.scrollTop===0){startY=e.touches[0].clientY;pulling=true;triggered=false;}},{passive:true});
  scrollEl.addEventListener("touchmove",e=>{
    if(!pulling)return;
    const dy=e.touches[0].clientY-startY;if(dy<=0){pulling=false;return;}
    const pull=Math.min(dy*.45,70);
    const spinner=document.getElementById("ptr-spinner");
    if(pull>10){indicator.style.top=(pull-56)+"px";if(spinner){spinner.style.transform=`rotate(${Math.round((pull/THRESHOLD)*270)}deg)`;spinner.style.borderTopColor=pull>=THRESHOLD?"var(--accent)":"rgba(255,107,43,.5)";}}
    if(pull>=THRESHOLD&&!triggered){triggered=true;const sp=document.getElementById("ptr-spinner");if(sp)sp.classList.add("spinning");}
  },{passive:true});
  scrollEl.addEventListener("touchend",e=>{
    if(!pulling)return;pulling=false;
    if(triggered){indicator.style.top="0px";setTimeout(()=>{const sp=document.getElementById("ptr-spinner");if(sp)sp.classList.remove("spinning");indicator.style.top="-56px";location.reload();},600);}
    else indicator.style.top="-56px";
  },{passive:true});
}

function exportDaten(){
  const data = { schueler, termine, exportiert: new Date().toISOString() };
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const datum = new Date().toISOString().split("T")[0];
  a.href = url;
  a.download = "fahrschule-backup-"+datum+".json";
  a.click();
  URL.revokeObjectURL(url);
}

function importDatenFromTextarea(){
  const ta=document.getElementById("paste-area");
  if(!ta||!ta.value.trim()){
    showModal({title:"Fehler",msg:"Bitte JSON einfügen.",btns:[{label:"OK",action:"closeModal()"}]});return;
  }
  try{
    const data=JSON.parse(ta.value.trim());
    if(!data.schueler||!data.termine){
      showModal({title:"Ungültige Daten",msg:"Die eingefügte Datei enthält keine gültigen Schüler- oder Terminedaten.",btns:[{label:"OK",action:"closeModal()"}]});return;
    }
    schueler=data.schueler;
    termine=data.termine;
    saveAll();
    syncKalenderToFahrstunden();
    renderDashboard();
  }catch(err){
    showModal({title:"Fehler",msg:"Fehler beim Einlesen: "+err.message,btns:[{label:"OK",action:"closeModal()"}]});
  }
}

function importDaten(input){
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    try {
      const data = JSON.parse(e.target.result);
      if(!data.schueler || !data.termine) {
        showModal({title:"Ungültige Datei",msg:"Die Datei enthält keine gültigen Backup-Daten.",btns:[{label:"OK",action:"closeModal()"}]});return;
      }
      showModal({
        title:"Daten wiederherstellen",
        msg:"Alle aktuellen Daten werden durch das Backup ersetzt. Fortfahren?",
        btns:[
          {label:"Wiederherstellen",primary:true,action:"_doImportDaten("+JSON.stringify(JSON.stringify(data))+")"},
          {label:"Abbrechen",action:"closeModal()"},
        ]
      });
    } catch(err) {
      showModal({title:"Fehler",msg:"Fehler beim Einlesen der Datei.",btns:[{label:"OK",action:"closeModal()"}]});
    }
  };
  reader.readAsText(file);
  input.value = "";
}
function _doImportDaten(jsonStr){
  closeModal();
  try{
    const data=JSON.parse(jsonStr);
    schueler=data.schueler;termine=data.termine;
    saveAll();syncKalenderToFahrstunden();renderDashboard();
  }catch(e){showModal({title:"Fehler",msg:"Daten konnten nicht wiederhergestellt werden.",btns:[{label:"OK",action:"closeModal()"}]});}
}

function syncKalenderToFahrstunden(){
  schueler.forEach(s=>{
    s.fahrstunden=[];
    const prevSonder={...(s.sonder&&!Array.isArray(s.sonder)?s.sonder:{ueberland:0,autobahn:0,nacht:0})};
    const manualOverride={...(s.manualSonder||{})};
    s.sonder={ueberland:0,autobahn:0,nacht:0};
    Object.entries(termine).forEach(([datum,ts])=>{
      ts.filter(t=>t.sid===s.id).forEach(t=>{
        if(t.typ==="pruef"){
          if(!s.pruefungen)s.pruefungen=[];
          // Robust duplicate check: same datum (ignore time differences)
          const existIdx=s.pruefungen.findIndex(p=>p.datum===datum);
          if(existIdx<0){
            // Push without versuch yet — we'll renumber after sort
            s.pruefungen.push({datum,uhr:t.uhr,versuch:0,bestanden:null,prufort:s.prufort||""});
          } else {
            // Update uhr if missing
            if(!s.pruefungen[existIdx].uhr&&t.uhr)s.pruefungen[existIdx].uhr=t.uhr;
          }
          return;
        }
        const notiz=(t.notiz||"").toLowerCase();
        let typ=t.typ||"normal";
        if(typ==="normal"||typ===""){
          if(notiz.includes("überlandfahrt")||notiz.includes("überland"))typ="ueberland";
          else if(notiz.includes("autobahnfahrt")||notiz.includes("autobahn"))typ="autobahn";
          else if(notiz.includes("nachtfahrt")||notiz.includes("nacht"))typ="nacht";
        }
        if(typ==="ueberland")s.sonder.ueberland=(s.sonder.ueberland||0)+t.min;
        if(typ==="autobahn")s.sonder.autobahn=(s.sonder.autobahn||0)+t.min;
        if(typ==="nacht")s.sonder.nacht=(s.sonder.nacht||0)+t.min;
        s.fahrstunden.push({datum,uhr:t.uhr,min:t.min,typ,einh:1,notiz:t.notiz||""});
      });
    });
    s.fahrstunden.sort((a,b)=>b.datum.localeCompare(a.datum)||(b.uhr||"").localeCompare(a.uhr||""));
    // Sort pruefungen by date, then assign versuch numbers correctly
    if(s.pruefungen&&s.pruefungen.length){
      s.pruefungen.sort((a,b)=>a.datum.localeCompare(b.datum));
      s.pruefungen.forEach((p,i)=>{
        // Only reassign if versuch is 0 (new) or was wrong
        if(p.versuch===0)p.versuch=i+1;
      });
    }
    // Apply manual overrides (explicit user setting takes precedence)
    ['ueberland','autobahn','nacht'].forEach(k=>{
      if(k in manualOverride){s.sonder[k]=manualOverride[k];}
      else if((prevSonder[k]||0)>(s.sonder[k]||0)){s.sonder[k]=prevSonder[k];}
    });
  });
}

function resetPruefErgebnis(sid,datum){
  const s=getS(sid);if(!s)return;
  const p=(s.pruefungen||[]).find(p=>p.datum===datum);
  if(p){p.bestanden=null;}
  saveAll();
  renderDashSchueler(sid);
}

function setPruefErgebnis(sid,datum,bestanden){
  const s=getS(sid);if(!s)return;
  if(!s.pruefungen)s.pruefungen=[];
  const p=s.pruefungen.find(p=>p.datum===datum);
  if(p){
    if(bestanden===null){delete p.bestanden;p.bestanden=null;}
    else{p.bestanden=bestanden;}
  } else if(bestanden!==null){
    s.pruefungen.push({datum,versuch:1,bestanden,prufort:s.prufort||""});
  }
  saveAll();
  syncKalenderToFahrstunden();
  renderDashSchueler(sid);
}

}

function saveNotizTextDash(sid,val){
  const s=getS(sid);if(!s)return;
  const lines=val.split("\n").map(t=>t.trim()).filter(t=>t);
  s.notizen=lines.map(t=>({text:t,done:false}));
  saveAll();
}

function toggleSonderDash(sid,key,min){
  const s=getS(sid);if(!s)return;
  if(!s.sonder||Array.isArray(s.sonder))s.sonder={ueberland:0,autobahn:0,nacht:0};
  s.sonder[key]=(s.sonder[key]||0)>=min?0:min;
  saveAll();
  const icon=document.getElementById("sf-icon-"+key);
  const label=document.getElementById("sf-label-"+key);
  if(icon){icon.className="ti "+(s.sonder[key]>=min?"ti-checkbox":"ti-square");icon.style.color=s.sonder[key]>=min?"#27A843":"var(--tx3)";}
  if(label){label.style.textDecoration=s.sonder[key]>=min?"line-through":"none";label.style.color=s.sonder[key]>=min?"var(--tx3)":"var(--tx)";}
}
